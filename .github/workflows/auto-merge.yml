name: Controlled auto-merge

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  pull_request_target:
    types: [labeled, unlabeled, ready_for_review, reopened]

permissions: {}

concurrency:
  group: auto-merge-${{ github.repository }}-${{ github.event.workflow_run.head_sha || github.event.pull_request.head.sha || github.run_id }}
  cancel-in-progress: false

jobs:
  merge:
    name: controlled auto-merge
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'pull_request') ||
      github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out trusted policy from the protected default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
          path: trusted

      - name: Merge eligible evidence-authorized pull request
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_PR: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
          OWN_CHECK_NAME: controlled auto-merge
          REPOSITORY: ${{ github.repository }}
          TRIGGER: ${{ github.event_name }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if [ "$TRIGGER" = "workflow_run" ]; then
            mapfile -t ASSOCIATED_PRS < <(
              jq -r '.workflow_run.pull_requests[]?.number' "$GITHUB_EVENT_PATH" | sort -u
            )
            if [ "${#ASSOCIATED_PRS[@]}" -eq 0 ]; then
              WORKFLOW_HEAD_REPOSITORY=$(jq -r '.workflow_run.head_repository.full_name // ""' "$GITHUB_EVENT_PATH")
              WORKFLOW_HEAD_BRANCH=$(jq -r '.workflow_run.head_branch // ""' "$GITHUB_EVENT_PATH")
              if [ "$WORKFLOW_HEAD_REPOSITORY" != "$REPOSITORY" ]; then
                echo "The completed CI run came from $WORKFLOW_HEAD_REPOSITORY; fork pull requests are never auto-merged."
                exit 1
              fi
              REPOSITORY_OWNER=${REPOSITORY%%/*}
              mapfile -t ASSOCIATED_PRS < <(
                gh api --method GET "repos/$REPOSITORY/pulls" \
                  -f state=open \
                  -f head="$REPOSITORY_OWNER:$WORKFLOW_HEAD_BRANCH" \
                  --jq '.[].number' | sort -u
              )
            fi
            if [ "${#ASSOCIATED_PRS[@]}" -eq 0 ]; then
              echo "The completed CI run has no open associated pull request; nothing to merge."
              exit 0
            fi
            if [ "${#ASSOCIATED_PRS[@]}" -ne 1 ]; then
              echo "The completed CI run is associated with multiple pull requests; refusing to merge."
              exit 1
            fi
            PR="${ASSOCIATED_PRS[0]}"
            EXPECTED_HEAD_SHA="$WORKFLOW_RUN_HEAD_SHA"
          elif [ "$TRIGGER" = "pull_request_target" ]; then
            PR="$EVENT_PR"
            EXPECTED_HEAD_SHA="$EVENT_HEAD_SHA"
          else
            echo "Unsupported privileged trigger $TRIGGER; refusing to merge."
            exit 1
          fi

          if ! [[ "$PR" =~ ^[1-9][0-9]*$ ]]; then
            echo "The pull-request identifier is invalid; refusing to merge."
            exit 1
          fi

          PR_JSON="$RUNNER_TEMP/auto-merge-pr.json"
          gh api "repos/$REPOSITORY/pulls/$PR" > "$PR_JSON"

          STATE=$(jq -r '.state' "$PR_JSON")
          DRAFT=$(jq -r '.draft' "$PR_JSON")
          BASE_BRANCH=$(jq -r '.base.ref' "$PR_JSON")
          HEAD_BRANCH=$(jq -r '.head.ref' "$PR_JSON")
          HEAD_REPOSITORY=$(jq -r '.head.repo.full_name // ""' "$PR_JSON")
          HEAD_SHA=$(jq -r '.head.sha' "$PR_JSON")

          if ! [[ "$HEAD_SHA" =~ ^[0-9a-f]{40,64}$ ]]; then
            echo "PR #$PR returned an invalid head SHA; refusing to merge."
            exit 1
          fi

          if [ "$STATE" != "open" ]; then
            echo "PR #$PR is no longer open; nothing to merge."
            exit 0
          fi
          if [ "$DRAFT" = "true" ]; then
            echo "PR #$PR is a draft; refusing to merge."
            exit 0
          fi
          if [ "$BASE_BRANCH" != "$DEFAULT_BRANCH" ]; then
            echo "PR #$PR targets $BASE_BRANCH instead of $DEFAULT_BRANCH; refusing to merge."
            exit 1
          fi
          if [ "$HEAD_REPOSITORY" != "$REPOSITORY" ]; then
            echo "PR #$PR comes from $HEAD_REPOSITORY; fork pull requests are never auto-merged."
            exit 1
          fi
          if [ "$HEAD_BRANCH" = "$DEFAULT_BRANCH" ]; then
            echo "PR #$PR uses the protected default branch as its head; refusing to merge."
            exit 1
          fi
          if [ -n "$EXPECTED_HEAD_SHA" ] && [ "$HEAD_SHA" != "$EXPECTED_HEAD_SHA" ]; then
            echo "PR #$PR moved after the completed CI run; waiting for CI on the current head."
            exit 0
          fi

          FILES_JSON="$RUNNER_TEMP/auto-merge-files.json"
          gh api --paginate "repos/$REPOSITORY/pulls/$PR/files?per_page=100" \
            --jq '.[] | {filename, previous_filename, status, additions, deletions, changes}' | jq -s '.' > "$FILES_JSON"

          DECLARED_FILE_COUNT=$(jq -r '.changed_files' "$PR_JSON")
          FETCHED_FILE_COUNT=$(jq -r 'length' "$FILES_JSON")
          if [ "$FETCHED_FILE_COUNT" -ne "$DECLARED_FILE_COUNT" ]; then
            echo "Changed-file inventory is incomplete ($FETCHED_FILE_COUNT/$DECLARED_FILE_COUNT); refusing to merge."
            exit 1
          fi

          AEGIS_MANIFEST_PATH='.aegis/foundation-manifest.json'
          AEGIS_MANIFEST_INPUT="$RUNNER_TEMP/auto-merge-aegis-manifest-input.json"
          AEGIS_MANIFEST_OBJECT_RESULT='{"decision":"not-applicable","results":[]}'
          printf '%s\n' '{"entries":[]}' > "$AEGIS_MANIFEST_INPUT"
          if jq -e --arg path "$AEGIS_MANIFEST_PATH" 'any(.[]; .filename == $path)' "$FILES_JSON" >/dev/null; then
            AEGIS_MANIFEST_STATUS=$(jq -r --arg path "$AEGIS_MANIFEST_PATH" '.[] | select(.filename == $path) | .status' "$FILES_JSON")
            if [ "$AEGIS_MANIFEST_STATUS" != "modified" ]; then
              echo "$AEGIS_MANIFEST_PATH must be an in-place modification; attended review is required."
              exit 1
            fi

            TRUSTED_BASE_SHA=$(git -C trusted rev-parse HEAD)
            if ! [[ "$TRUSTED_BASE_SHA" =~ ^[0-9a-f]{40}([0-9a-f]{24})?$ ]]; then
              echo "The trusted default-branch checkout returned an invalid commit SHA."
              exit 1
            fi
            DEFAULT_REF_JSON="$RUNNER_TEMP/auto-merge-default-ref.json"
            gh api \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/$REPOSITORY/git/ref/heads/$DEFAULT_BRANCH" > "$DEFAULT_REF_JSON"
            jq -e \
              'type == "object" and .object.type == "commit" and (.object.sha | type == "string" and test("^[0-9a-f]{40}([0-9a-f]{24})?$"))' \
              "$DEFAULT_REF_JSON" >/dev/null
            CURRENT_DEFAULT_SHA=$(jq -r '.object.sha' "$DEFAULT_REF_JSON")
            if [ "$TRUSTED_BASE_SHA" != "$CURRENT_DEFAULT_SHA" ]; then
              echo "Protected $DEFAULT_BRANCH advanced after trusted checkout; waiting for a later evaluation."
              exit 0
            fi

            collect_manifest_tree_evidence() {
              local revision="$1"
              local commit_sha="$2"
              local output_path="$3"
              local commit_json="$RUNNER_TEMP/aegis-$revision-commit.json"
              local root_tree_json="$RUNNER_TEMP/aegis-$revision-root-tree.json"
              local manifest_tree_json="$RUNNER_TEMP/aegis-$revision-manifest-tree.json"

              gh api \
                -H 'Accept: application/vnd.github+json' \
                -H 'X-GitHub-Api-Version: 2026-03-10' \
                "repos/$REPOSITORY/git/commits/$commit_sha" > "$commit_json"
              jq -e --arg sha "$commit_sha" \
                'type == "object" and .sha == $sha and (.tree | type == "object") and (.tree.sha | type == "string" and test("^[0-9a-f]{40}([0-9a-f]{24})?$"))' \
                "$commit_json" >/dev/null
              local root_tree_sha
              root_tree_sha=$(jq -r '.tree.sha' "$commit_json")

              gh api \
                -H 'Accept: application/vnd.github+json' \
                -H 'X-GitHub-Api-Version: 2026-03-10' \
                "repos/$REPOSITORY/git/trees/$root_tree_sha" > "$root_tree_json"
              jq -e --arg sha "$root_tree_sha" \
                'type == "object" and .sha == $sha and (.tree | type == "array") and (.truncated | type == "boolean")' \
                "$root_tree_json" >/dev/null

              local root_truncated
              local root_entry_count
              local root_entry_json
              local root_entry_path
              local root_entry_type
              local root_entry_mode
              local root_entry_sha
              root_truncated=$(jq -r '.truncated' "$root_tree_json")
              root_entry_count=$(jq '[.tree[] | select(.path == ".aegis")] | length' "$root_tree_json")
              root_entry_json=$(jq -c '[.tree[] | select(.path == ".aegis")] | if length == 1 then .[0] else {} end' "$root_tree_json")
              root_entry_path=$(jq -r '.path // ""' <<< "$root_entry_json")
              root_entry_type=$(jq -r '.type // ""' <<< "$root_entry_json")
              root_entry_mode=$(jq -r '.mode // ""' <<< "$root_entry_json")
              root_entry_sha=$(jq -r '.sha // ""' <<< "$root_entry_json")

              local manifest_truncated=null
              local manifest_entry_count=0
              local manifest_entry_path=''
              local manifest_entry_type=''
              local manifest_entry_mode=''
              local manifest_entry_sha=''
              if [ "$root_truncated" = "false" ] && \
                 [ "$root_entry_count" -eq 1 ] && \
                 [ "$root_entry_path" = ".aegis" ] && \
                 [ "$root_entry_type" = "tree" ] && \
                 [ "$root_entry_mode" = "040000" ] && \
                 [[ "$root_entry_sha" =~ ^[0-9a-f]{40}([0-9a-f]{24})?$ ]]; then
                gh api \
                  -H 'Accept: application/vnd.github+json' \
                  -H 'X-GitHub-Api-Version: 2026-03-10' \
                  "repos/$REPOSITORY/git/trees/$root_entry_sha" > "$manifest_tree_json"
                jq -e --arg sha "$root_entry_sha" \
                  'type == "object" and .sha == $sha and (.tree | type == "array") and (.truncated | type == "boolean")' \
                  "$manifest_tree_json" >/dev/null
                manifest_truncated=$(jq -r '.truncated' "$manifest_tree_json")
                manifest_entry_count=$(jq '[.tree[] | select(.path == "foundation-manifest.json")] | length' "$manifest_tree_json")
                local manifest_entry_json
                manifest_entry_json=$(jq -c '[.tree[] | select(.path == "foundation-manifest.json")] | if length == 1 then .[0] else {} end' "$manifest_tree_json")
                manifest_entry_path=$(jq -r '.path // ""' <<< "$manifest_entry_json")
                manifest_entry_type=$(jq -r '.type // ""' <<< "$manifest_entry_json")
                manifest_entry_mode=$(jq -r '.mode // ""' <<< "$manifest_entry_json")
                manifest_entry_sha=$(jq -r '.sha // ""' <<< "$manifest_entry_json")
              fi

              jq -n \
                --arg revision "$revision" \
                --arg path "$AEGIS_MANIFEST_PATH" \
                --arg commit_sha "$commit_sha" \
                --argjson root_truncated "$root_truncated" \
                --arg root_entry_count "$root_entry_count" \
                --arg root_entry_path "$root_entry_path" \
                --arg root_entry_type "$root_entry_type" \
                --arg root_entry_mode "$root_entry_mode" \
                --arg root_entry_sha "$root_entry_sha" \
                --argjson manifest_truncated "$manifest_truncated" \
                --arg manifest_entry_count "$manifest_entry_count" \
                --arg manifest_entry_path "$manifest_entry_path" \
                --arg manifest_entry_type "$manifest_entry_type" \
                --arg manifest_entry_mode "$manifest_entry_mode" \
                --arg manifest_entry_sha "$manifest_entry_sha" \
                '{
                  revision: $revision,
                  path: $path,
                  commit_sha: $commit_sha,
                  root_tree: {
                    truncated: $root_truncated,
                    entry_count: ($root_entry_count | tonumber),
                    path: $root_entry_path,
                    type: $root_entry_type,
                    mode: $root_entry_mode,
                    sha: $root_entry_sha
                  },
                  manifest_tree: {
                    truncated: $manifest_truncated,
                    entry_count: ($manifest_entry_count | tonumber),
                    path: $manifest_entry_path,
                    type: $manifest_entry_type,
                    mode: $manifest_entry_mode,
                    sha: $manifest_entry_sha
                  }
                }' > "$output_path"
            }

            BASE_AEGIS_OBJECT="$RUNNER_TEMP/aegis-base-object.json"
            HEAD_AEGIS_OBJECT="$RUNNER_TEMP/aegis-head-object.json"
            AEGIS_OBJECT_INPUT="$RUNNER_TEMP/auto-merge-aegis-object-input.json"
            collect_manifest_tree_evidence base "$TRUSTED_BASE_SHA" "$BASE_AEGIS_OBJECT"
            collect_manifest_tree_evidence head "$HEAD_SHA" "$HEAD_AEGIS_OBJECT"
            jq -s '{entries: .}' "$BASE_AEGIS_OBJECT" "$HEAD_AEGIS_OBJECT" > "$AEGIS_OBJECT_INPUT"
            AEGIS_MANIFEST_OBJECT_RESULT=$(node trusted/scripts/ci/auto-merge-policy.mjs aegis-manifest-object --input "$AEGIS_OBJECT_INPUT")
            echo "$AEGIS_MANIFEST_OBJECT_RESULT" | jq .
            if [ "$(echo "$AEGIS_MANIFEST_OBJECT_RESULT" | jq -r '.decision')" != "allow" ]; then
              echo "$AEGIS_MANIFEST_PATH is not a unique regular 100644 Git blob in both protected main and the exact PR head."
              exit 1
            fi

            BASE_AEGIS_BLOB_SHA=$(echo "$AEGIS_MANIFEST_OBJECT_RESULT" | jq -er '.results[] | select(.revision == "base" and .state == "regular-blob") | .blob_sha')
            HEAD_AEGIS_BLOB_SHA=$(echo "$AEGIS_MANIFEST_OBJECT_RESULT" | jq -er '.results[] | select(.revision == "head" and .state == "regular-blob") | .blob_sha')

            fetch_verified_manifest_blob() {
              local revision="$1"
              local blob_sha="$2"
              local output_path="$3"
              local blob_json="$RUNNER_TEMP/aegis-$revision-blob.json"
              gh api \
                -H 'Accept: application/vnd.github+json' \
                -H 'X-GitHub-Api-Version: 2026-03-10' \
                "repos/$REPOSITORY/git/blobs/$blob_sha" > "$blob_json"
              jq -e --arg sha "$blob_sha" \
                'type == "object" and .sha == $sha and .encoding == "base64" and (.content | type == "string") and (.size | type == "number") and .size >= 0 and .size == (.size | floor)' \
                "$blob_json" >/dev/null
              jq -r '.content' "$blob_json" | tr -d '\n' | base64 --decode > "$output_path"
              local expected_size
              local actual_size
              expected_size=$(jq -r '.size' "$blob_json")
              actual_size=$(wc -c < "$output_path" | tr -d ' ')
              if [ "$actual_size" -ne "$expected_size" ]; then
                echo "Decoded $revision manifest blob size mismatch ($actual_size/$expected_size)."
                exit 1
              fi
              jq -e 'type == "object"' "$output_path" >/dev/null
            }

            BASE_AEGIS_MANIFEST="$RUNNER_TEMP/base-aegis-foundation-manifest.json"
            HEAD_AEGIS_MANIFEST="$RUNNER_TEMP/head-aegis-foundation-manifest.json"
            fetch_verified_manifest_blob base "$BASE_AEGIS_BLOB_SHA" "$BASE_AEGIS_MANIFEST"
            fetch_verified_manifest_blob head "$HEAD_AEGIS_BLOB_SHA" "$HEAD_AEGIS_MANIFEST"
            jq -n \
              --arg path "$AEGIS_MANIFEST_PATH" \
              --slurpfile base "$BASE_AEGIS_MANIFEST" \
              --slurpfile head "$HEAD_AEGIS_MANIFEST" \
              '{entries: [{path: $path, base: $base[0], head: $head[0]}]}' \
              > "$AEGIS_MANIFEST_INPUT"
          fi
          AEGIS_MANIFEST_RESULT=$(node trusted/scripts/ci/auto-merge-policy.mjs aegis-manifest --input "$AEGIS_MANIFEST_INPUT")
          echo "$AEGIS_MANIFEST_RESULT" | jq .
          if [ "$(echo "$AEGIS_MANIFEST_RESULT" | jq -r '.decision')" != "allow" ]; then
            echo "$AEGIS_MANIFEST_PATH changed beyond verification.last_verified_at; attended review is required."
            exit 1
          fi

          POLICY_INPUT="$RUNNER_TEMP/auto-merge-policy-input.json"
          jq -n \
            --slurpfile files "$FILES_JSON" \
            --slurpfile pr "$PR_JSON" \
            --slurpfile capabilities trusted/config/ci/verification-capabilities.json \
            --argjson aegis_manifest_object "$AEGIS_MANIFEST_OBJECT_RESULT" \
            --argjson aegis_manifest_verification "$AEGIS_MANIFEST_RESULT" \
            '{files: $files[0], file_inventory_complete: true, labels: [$pr[0].labels[].name], test_capabilities: $capabilities[0], aegis_manifest_object: $aegis_manifest_object, aegis_manifest_verification: $aegis_manifest_verification}' \
            > "$POLICY_INPUT"
          POLICY_RESULT=$(node trusted/scripts/ci/auto-merge-policy.mjs classify --input "$POLICY_INPUT")
          echo "$POLICY_RESULT" | jq .
          if [ "$(echo "$POLICY_RESULT" | jq -r '.decision')" != "allow" ]; then
            echo "PR #$PR violates the controlled auto-merge allow/deny policy."
            exit 1
          fi

          PACKAGE_INPUT="$RUNNER_TEMP/auto-merge-package-input.json"
          printf '%s\n' '{"entries":[]}' > "$PACKAGE_INPUT"
          while IFS= read -r PACKAGE_PATH; do
            if ! [[ "$PACKAGE_PATH" =~ ^(package\.json|[A-Za-z0-9._@+-]+(/[A-Za-z0-9._@+-]+)*/package\.json)$ ]]; then
              echo "Package manifest path $PACKAGE_PATH is not safe for trusted inspection."
              exit 1
            fi
            if [ ! -f "trusted/$PACKAGE_PATH" ]; then
              echo "Package manifest $PACKAGE_PATH is new or absent from trusted main; attended review is required."
              exit 1
            fi
            HEAD_MANIFEST="$RUNNER_TEMP/head-$(printf '%s' "$PACKAGE_PATH" | sha256sum | cut -d' ' -f1).json"
            gh api "repos/$REPOSITORY/contents/$PACKAGE_PATH?ref=$HEAD_SHA" \
              --jq '.content' | tr -d '\n' | base64 --decode > "$HEAD_MANIFEST"
            jq -e 'type == "object"' "$HEAD_MANIFEST" >/dev/null
            NEXT_PACKAGE_INPUT="$RUNNER_TEMP/auto-merge-package-input-next.json"
            jq \
              --arg path "$PACKAGE_PATH" \
              --slurpfile base "trusted/$PACKAGE_PATH" \
              --slurpfile head "$HEAD_MANIFEST" \
              '.entries += [{path: $path, base: $base[0], head: $head[0]}]' \
              "$PACKAGE_INPUT" > "$NEXT_PACKAGE_INPUT"
            mv "$NEXT_PACKAGE_INPUT" "$PACKAGE_INPUT"
          done < <(jq -r '.[].filename | select(test("(^|/)package\\.json$"))' "$FILES_JSON")

          PACKAGE_RESULT=$(node trusted/scripts/ci/auto-merge-policy.mjs manifests --input "$PACKAGE_INPUT")
          echo "$PACKAGE_RESULT" | jq .
          if [ "$(echo "$PACKAGE_RESULT" | jq -r '.decision')" != "allow" ]; then
            echo "Package scripts changed or could not be verified against trusted main; attended review is required."
            exit 1
          fi

          CHECK_RUNS="$RUNNER_TEMP/auto-merge-check-runs.json"
          CHECK_INPUT="$RUNNER_TEMP/auto-merge-check-input.json"
          gh api --paginate \
            -H 'Accept: application/vnd.github+json' \
            "repos/$REPOSITORY/commits/$HEAD_SHA/check-runs?per_page=100" \
            --jq '.check_runs[]' | jq -s '{check_runs: .}' > "$CHECK_RUNS"
          jq -n \
            --slurpfile runs "$CHECK_RUNS" \
            --arg own "$OWN_CHECK_NAME" \
            '{check_runs: $runs[0].check_runs, excluded_names: [$own], required_app_slug: "github-actions"}' \
            > "$CHECK_INPUT"
          CHECK_RESULT=$(node trusted/scripts/ci/auto-merge-policy.mjs checks --input "$CHECK_INPUT")
          echo "$CHECK_RESULT" | jq .
          CHECK_DECISION=$(echo "$CHECK_RESULT" | jq -r '.decision')
          if [ "$CHECK_DECISION" = "defer" ]; then
            echo "Required checks on PR #$PR are not all complete; the CI-completion trigger will retry."
            exit 0
          fi
          if [ "$CHECK_DECISION" != "allow" ]; then
            echo "A required check on PR #$PR failed or came from an unexpected app; refusing to merge."
            exit 1
          fi

          BASE_SHA=$(gh api "repos/$REPOSITORY/git/ref/heads/$DEFAULT_BRANCH" --jq '.object.sha')
          BEHIND_BY=$(gh api "repos/$REPOSITORY/compare/$BASE_SHA...$HEAD_SHA" --jq '.behind_by')
          if [ "$BEHIND_BY" -ne 0 ]; then
            echo "PR #$PR is behind $DEFAULT_BRANCH; waiting for the branch to be updated."
            exit 0
          fi

          CURRENT_PR_JSON="$RUNNER_TEMP/auto-merge-current-pr.json"
          gh api "repos/$REPOSITORY/pulls/$PR" > "$CURRENT_PR_JSON"
          if [ "$(jq -r '.state' "$CURRENT_PR_JSON")" != "open" ]; then
            echo "PR #$PR closed during evaluation; nothing to merge."
            exit 0
          fi
          if [ "$(jq -r '.head.sha' "$CURRENT_PR_JSON")" != "$HEAD_SHA" ]; then
            echo "PR #$PR moved during evaluation; waiting for CI on the new head."
            exit 0
          fi
          if [ "$(jq -r '.draft' "$CURRENT_PR_JSON")" = "true" ]; then
            echo "PR #$PR became a draft during evaluation; refusing to merge."
            exit 0
          fi
          if [ "$(jq -r '.mergeable' "$CURRENT_PR_JSON")" = "null" ] || \
             [ "$(jq -r '.mergeable_state' "$CURRENT_PR_JSON")" = "unknown" ]; then
            echo "GitHub has not finished computing mergeability for PR #$PR; waiting for a later trigger."
            exit 0
          fi
          if [ "$(jq -r '.mergeable' "$CURRENT_PR_JSON")" != "true" ] || \
             [ "$(jq -r '.mergeable_state' "$CURRENT_PR_JSON")" != "clean" ]; then
            echo "PR #$PR is not CLEAN and mergeable; refusing autonomous merge."
            exit 1
          fi

          REPOSITORY_OWNER=${REPOSITORY%%/*}
          REPOSITORY_NAME=${REPOSITORY#*/}
          REVIEW_STATE_JSON="$RUNNER_TEMP/auto-merge-review-state.json"
          gh api graphql \
            -f query='query($owner:String!,$name:String!,$number:Int!){repository(owner:$owner,name:$name){pullRequest(number:$number){reviewDecision reviewThreads(first:100){nodes{isResolved} pageInfo{hasNextPage}}}}}' \
            -f owner="$REPOSITORY_OWNER" \
            -f name="$REPOSITORY_NAME" \
            -F number="$PR" > "$REVIEW_STATE_JSON"
          if [ "$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage' "$REVIEW_STATE_JSON")" != "false" ]; then
            echo "PR #$PR has more review threads than the trusted evaluation fetched; refusing autonomous merge."
            exit 1
          fi
          if [ "$(jq '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved != true)] | length' "$REVIEW_STATE_JSON")" -ne 0 ]; then
            echo "PR #$PR has unresolved review threads; refusing autonomous merge."
            exit 1
          fi
          if [ "$(jq -r '.data.repository.pullRequest.reviewDecision // ""' "$REVIEW_STATE_JSON")" = "CHANGES_REQUESTED" ]; then
            echo "PR #$PR has an active changes-requested review; refusing autonomous merge."
            exit 1
          fi

          CURRENT_FILES_JSON="$RUNNER_TEMP/auto-merge-current-files.json"
          gh api --paginate "repos/$REPOSITORY/pulls/$PR/files?per_page=100" \
            --jq '.[] | {filename, previous_filename, status, additions, deletions, changes}' | jq -s '.' \
            > "$CURRENT_FILES_JSON"
          CURRENT_DECLARED_FILE_COUNT=$(jq -r '.changed_files' "$CURRENT_PR_JSON")
          CURRENT_FETCHED_FILE_COUNT=$(jq -r 'length' "$CURRENT_FILES_JSON")
          if [ "$CURRENT_FETCHED_FILE_COUNT" -ne "$CURRENT_DECLARED_FILE_COUNT" ]; then
            echo "Final changed-file inventory is incomplete ($CURRENT_FETCHED_FILE_COUNT/$CURRENT_DECLARED_FILE_COUNT); refusing to merge."
            exit 1
          fi

          CURRENT_POLICY_INPUT="$RUNNER_TEMP/auto-merge-current-policy-input.json"
          jq -n \
            --slurpfile files "$CURRENT_FILES_JSON" \
            --slurpfile pr "$CURRENT_PR_JSON" \
            --slurpfile capabilities trusted/config/ci/verification-capabilities.json \
            --argjson aegis_manifest_object "$AEGIS_MANIFEST_OBJECT_RESULT" \
            --argjson aegis_manifest_verification "$AEGIS_MANIFEST_RESULT" \
            '{files: $files[0], file_inventory_complete: true, labels: [$pr[0].labels[].name], test_capabilities: $capabilities[0], aegis_manifest_object: $aegis_manifest_object, aegis_manifest_verification: $aegis_manifest_verification}' \
            > "$CURRENT_POLICY_INPUT"
          CURRENT_POLICY_RESULT=$(node trusted/scripts/ci/auto-merge-policy.mjs classify --input "$CURRENT_POLICY_INPUT")
          echo "$CURRENT_POLICY_RESULT" | jq .
          if [ "$(echo "$CURRENT_POLICY_RESULT" | jq -r '.decision')" != "allow" ]; then
            echo "PR #$PR became ineligible during final policy revalidation."
            exit 1
          fi

          gh api --paginate \
            -H 'Accept: application/vnd.github+json' \
            "repos/$REPOSITORY/commits/$HEAD_SHA/check-runs?per_page=100" \
            --jq '.check_runs[]' | jq -s '{check_runs: .}' > "$CHECK_RUNS"
          jq -n \
            --slurpfile runs "$CHECK_RUNS" \
            --arg own "$OWN_CHECK_NAME" \
            '{check_runs: $runs[0].check_runs, excluded_names: [$own], required_app_slug: "github-actions"}' \
            > "$CHECK_INPUT"
          CURRENT_CHECK_RESULT=$(node trusted/scripts/ci/auto-merge-policy.mjs checks --input "$CHECK_INPUT")
          echo "$CURRENT_CHECK_RESULT" | jq .
          if [ "$(echo "$CURRENT_CHECK_RESULT" | jq -r '.decision')" != "allow" ]; then
            echo "Required checks changed during final evaluation; refusing autonomous merge."
            exit 1
          fi

          echo "Policy and required checks passed; squash-merging PR #$PR at $HEAD_SHA."
          gh pr merge "$PR" \
            --repo "$REPOSITORY" \
            --squash \
            --delete-branch \
            --match-head-commit "$HEAD_SHA"

          POST_MERGE_PR_JSON="$RUNNER_TEMP/post-merge-pull-request.json"
          gh api \
            -H 'Accept: application/vnd.github+json' \
            "repos/$REPOSITORY/pulls/$PR" > "$POST_MERGE_PR_JSON"

          MERGE_SHA=$(jq -r '.merge_commit_sha // ""' "$POST_MERGE_PR_JSON")
          MERGED_HEAD_SHA=$(jq -r '.head.sha // ""' "$POST_MERGE_PR_JSON")
          MERGED_HEAD_REPOSITORY=$(jq -r '.head.repo.full_name // ""' "$POST_MERGE_PR_JSON")
          MERGED_BASE_BRANCH=$(jq -r '.base.ref // ""' "$POST_MERGE_PR_JSON")
          if [ "$(jq -r '.merged // false' "$POST_MERGE_PR_JSON")" != "true" ]; then
            echo "PR #$PR did not report a completed merge; refusing post-merge dispatch."
            exit 1
          fi
          if ! [[ "$MERGE_SHA" =~ ^[0-9a-f]{40}([0-9a-f]{24})?$ ]]; then
            echo "PR #$PR returned an invalid merge commit SHA; refusing post-merge dispatch."
            exit 1
          fi
          if [ "$MERGED_HEAD_SHA" != "$HEAD_SHA" ]; then
            echo "PR #$PR merged a different reviewed head; refusing post-merge dispatch."
            exit 1
          fi
          if [ "$MERGED_HEAD_REPOSITORY" != "$REPOSITORY" ]; then
            echo "PR #$PR no longer belongs to the same repository; refusing post-merge dispatch."
            exit 1
          fi
          if [ "$MERGED_BASE_BRANCH" != "$DEFAULT_BRANCH" ]; then
            echo "PR #$PR merged into an unexpected base branch; refusing post-merge dispatch."
            exit 1
          fi

          DEFAULT_BRANCH_SHA=$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "repos/$REPOSITORY/git/ref/heads/$DEFAULT_BRANCH" \
            --jq '.object.sha // ""')
          if ! [[ "$DEFAULT_BRANCH_SHA" =~ ^[0-9a-f]{40}([0-9a-f]{24})?$ ]]; then
            echo "The protected default branch returned an invalid SHA; refusing post-merge dispatch."
            exit 1
          fi
          COMPARE_STATUS=$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "repos/$REPOSITORY/compare/$MERGE_SHA...$DEFAULT_BRANCH_SHA" \
            --jq '.status // ""')
          if [ "$COMPARE_STATUS" != "identical" ] && [ "$COMPARE_STATUS" != "ahead" ]; then
            echo "Merge commit $MERGE_SHA is not reachable from protected $DEFAULT_BRANCH; refusing post-merge dispatch."
            exit 1
          fi

          POST_MERGE_DISPATCH_JSON="$RUNNER_TEMP/post-merge-dispatch.json"
          jq -n \
            --arg event_type 'post-controlled-auto-merge-ci' \
            --arg merge_sha "$MERGE_SHA" \
            --argjson pr_number "$PR" \
            --arg reviewed_head_sha "$HEAD_SHA" \
            '{
              event_type: $event_type,
              client_payload: {
                merge_sha: $merge_sha,
                pr_number: $pr_number,
                reviewed_head_sha: $reviewed_head_sha
              }
            }' > "$POST_MERGE_DISPATCH_JSON"
          gh api \
            --method POST \
            -H 'Accept: application/vnd.github+json' \
            "repos/$REPOSITORY/dispatches" \
            --input "$POST_MERGE_DISPATCH_JSON"
          echo "Dispatched trusted post-merge CI for PR #$PR at $MERGE_SHA."
