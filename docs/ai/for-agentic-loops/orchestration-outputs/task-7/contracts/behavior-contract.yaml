# Behavior Contract for Task 7: Build Core Layout Components
# This contract defines the functional requirements and interaction patterns

header_behavior:
  responsive_navigation:
    desktop:
      - "Show full navigation links horizontally"
      - "Theme switcher visible in navigation"
      - "Logo click navigates to home"
      - "Active page highlighted in nav"
      - "Hover states on all interactive elements"
    mobile:
      - "Navigation collapses to hamburger menu at breakpoint"
      - "Hamburger menu opens Sheet component from right"
      - "Sheet contains vertical navigation"
      - "Theme switcher remains visible outside menu"
      - "Menu closes on navigation or outside click"
      - "Menu traps focus when open"
      - "ESC key closes menu"
    
  scroll_behavior:
    sticky_enabled:
      - "Header sticks to top on scroll down"
      - "Adds shadow/border on scroll"
      - "Optional: Hide on scroll down, show on scroll up"
    sticky_disabled:
      - "Header scrolls with page content"
      - "No position changes on scroll"
  
  accessibility:
    - "Skip navigation link as first focusable element"
    - "Logical tab order through navigation"
    - "Mobile menu announces open/close state"
    - "Current page indicated with aria-current"
    - "All interactive elements keyboard accessible"
    - "44px minimum touch targets on mobile"

footer_behavior:
  layout:
    - "Responsive grid layout for link sections"
    - "Social links as icon buttons"
    - "Trust signals centered and prominent"
    - "Copyright and tax info at bottom"
  
  interactions:
    - "All links keyboard navigable"
    - "External links open in new tab with proper rel attributes"
    - "Social links have hover tooltips"
    - "Trust signal badges may link to verification"
  
  responsive:
    mobile:
      - "Single column layout"
      - "Collapsible sections optional"
      - "Social links remain horizontal"
    tablet:
      - "Two column layout for link sections"
      - "Trust signals in single row"
    desktop:
      - "Multi-column layout (4-5 columns)"
      - "All content visible without scrolling"

main_layout_behavior:
  structure:
    - "Flexbox column layout (header, main, footer)"
    - "Main content area expands to fill viewport"
    - "Footer pushed to bottom (no floating)"
    - "Proper semantic HTML structure"
  
  skip_navigation:
    - "Hidden by default, visible on focus"
    - "Jumps to main content area"
    - "Styled prominently when focused"
    - "Works with screen readers"
  
  emergency_banner:
    when_visible:
      - "Appears above header"
      - "Pushes all content down"
      - "Remains visible on scroll"
      - "Dismissible with preference memory"
      - "Auto-expires based on date"
    urgency_levels:
      low: "Info background, dismissible"
      medium: "Warning background, prominent CTA"
      high: "Alert background, sticky, large CTA"
      critical: "Danger background, not dismissible, immediate action"
  
  content_sensitivity:
    - "Integrates with content gate system"
    - "Progressive disclosure for sensitive content"
    - "User preferences remembered"
    - "Clear content warnings"
    - "Safe viewing modes"

state_management:
  mobile_menu:
    state: "isOpen: boolean"
    actions:
      - "open(): Sets isOpen to true"
      - "close(): Sets isOpen to false"
      - "toggle(): Inverts isOpen"
    side_effects:
      - "Body scroll locked when open"
      - "Focus trapped in menu"
      - "Closes on route change"
  
  theme:
    state: "current: 'light' | 'dark' | 'contrast' | 'gentle'"
    persistence: "localStorage"
    system_preference: "Detected on mount"
    keyboard_shortcut: "Ctrl/Cmd + Shift + T cycles themes"
  
  scroll:
    state: "scrollY: number, isScrollingUp: boolean"
    threshold: "5px minimum before triggering"
    debounce: "Throttled to 16ms (60fps)"
  
  emergency_banner:
    state: "dismissed: boolean, expiryTime: Date | null"
    persistence: "sessionStorage or localStorage"
    auto_dismiss: "Based on urgency level"

error_handling:
  navigation_failures:
    - "Graceful fallback for failed navigation"
    - "Error boundary around navigation components"
    - "Offline mode indicators"
  
  image_loading:
    - "Logo fallback to text"
    - "Social icon fallbacks"
    - "Progressive image loading"
  
  theme_switching:
    - "Fallback to system preference"
    - "Handle localStorage errors"
    - "Prevent flash of wrong theme"
  
  mobile_menu:
    - "Handle touch and click events"
    - "Prevent double-toggle on fast clicks"
    - "Close on browser back button"

user_interactions:
  keyboard:
    - "Tab: Navigate through focusable elements"
    - "Enter/Space: Activate buttons and links"
    - "Escape: Close mobile menu or dialogs"
    - "Arrow keys: Navigate menu items (optional)"
  
  mouse:
    - "Hover states on all interactive elements"
    - "Click outside to close mobile menu"
    - "No hover-only functionality"
  
  touch:
    - "44px minimum touch targets"
    - "Swipe to close mobile menu (optional)"
    - "No touch-only functionality"
    - "Proper touch event handling"
  
  screen_reader:
    - "Announce navigation state changes"
    - "Read navigation hierarchy correctly"
    - "Announce current page"
    - "Describe trust signals"

trauma_informed_behavior:
  gentle_interactions:
    - "No sudden layout shifts"
    - "Smooth transitions (respecting prefers-reduced-motion)"
    - "Predictable navigation patterns"
    - "Clear visual feedback"
  
  content_warnings:
    - "Integrated into layout when needed"
    - "Non-intrusive but clear"
    - "User control maintained"
    - "Easy exit options"
  
  emergency_appeals:
    - "Balance urgency with sensitivity"
    - "Provide clear actions"
    - "Include support resources"
    - "Respect user boundaries"