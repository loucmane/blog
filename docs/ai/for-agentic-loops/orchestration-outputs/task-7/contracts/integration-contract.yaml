# Integration Contract for Task 7: Build Core Layout Components
# This contract defines file structure, naming conventions, imports, and integration patterns

version: "1.0"
task_id: 7
title: "Build Core Layout Components"

# File Structure Requirements
file_structure:
  base_path: "packages/web/src/components/layout"
  
  required_files:
    - path: "Header.tsx"
      description: "Header component implementation"
      exports: ["Header", "type HeaderProps"]
      
    - path: "Footer.tsx"
      description: "Footer component implementation"
      exports: ["Footer", "type FooterProps"]
      
    - path: "MainLayout.tsx"
      description: "Main layout wrapper component"
      exports: ["MainLayout", "type MainLayoutProps"]
      
    - path: "index.ts"
      description: "Barrel export for all layout components"
      exports: ["Header", "Footer", "MainLayout", "all type exports"]
      
  optional_files:
    - path: "types.ts"
      description: "Shared types for layout components"
      note: "Can also be defined in each component file"
      
    - path: "MobileMenu.tsx"
      description: "Extracted mobile menu component"
      note: "Can be part of Header.tsx"
      
    - path: "EmergencyBanner.tsx"
      description: "Standalone emergency banner component"
      note: "Can be part of Header.tsx"

# Import Conventions
imports:
  order:
    - "React and Next.js imports"
    - "External library imports"
    - "Monorepo package imports"
    - "Local component imports"
    - "Utility imports"
    - "Type imports"
    
  examples:
    Header: |
      'use client'
      
      import * as React from 'react'
      import Link from 'next/link'
      import { Menu, X } from 'lucide-react'
      import { ThemeSwitcher } from '@minniewinnie/ui'
      import { Button } from '@/components/ui/button'
      import { Sheet, SheetContent, SheetHeader, SheetTitle, SheetTrigger } from '@/components/ui/sheet'
      import { cn } from '@/lib/utils'
      import type { HeaderProps } from './types'
      
    Footer: |
      import * as React from 'react'
      import Link from 'next/link'
      import { Facebook, Twitter, Instagram, Youtube, Heart, Shield, Award } from 'lucide-react'
      import { cn } from '@/lib/utils'
      import type { FooterProps } from './types'
      
    MainLayout: |
      import * as React from 'react'
      import { Header } from './Header'
      import { Footer } from './Footer'
      import { cn } from '@/lib/utils'
      import type { MainLayoutProps } from './types'

# Theme Integration
theme_integration:
  css_variables:
    - "Use CSS variables for all colors"
    - "Access via Tailwind classes (bg-background, text-foreground)"
    - "Support all four themes automatically"
    
  tailwind_classes:
    required_patterns:
      - "bg-background" # Instead of hardcoded colors
      - "text-foreground" # For primary text
      - "border-border" # For borders
      - "text-muted-foreground" # For secondary text
      
  theme_aware_components:
    - "ThemeSwitcher from @minniewinnie/ui"
    - "Must be integrated in Header"
    - "Respect system preferences"

# Component Integration Patterns
integration_patterns:
  with_shadcn_ui:
    - "Use Sheet component for mobile menu"
    - "Use Button component for interactive elements"
    - "Import from @/components/ui/*"
    - "Follow shadcn/ui conventions"
    
  with_next_js:
    - "Use 'use client' directive for interactive components"
    - "Use next/link for navigation"
    - "Use next/image for optimized images (if logos)"
    - "Support Next.js App Router"
    
  with_monorepo:
    - "Import ThemeSwitcher from @minniewinnie/ui"
    - "Import shared types from @minniewinnie/shared"
    - "Use design tokens from ui package"

# Naming Conventions
naming:
  components:
    - "PascalCase for component names"
    - "Include displayName for all components"
    - "Match filename to component name"
    
  props:
    - "ComponentNameProps pattern"
    - "Export type alongside component"
    
  variables:
    - "camelCase for variables and functions"
    - "Boolean props start with 'is', 'has', 'should'"
    - "Event handlers start with 'on'"
    
  css_classes:
    - "Use cn() utility for conditional classes"
    - "Kebab-case for custom CSS classes"
    - "Semantic class names"

# Export Requirements
exports:
  individual_components: |
    // Header.tsx
    export { Header }
    export type { HeaderProps }
    
    // Footer.tsx
    export { Footer }
    export type { FooterProps }
    
    // MainLayout.tsx
    export { MainLayout }
    export type { MainLayoutProps }
    
  barrel_export: |
    // index.ts
    export { Header } from './Header'
    export { Footer } from './Footer'
    export { MainLayout } from './MainLayout'
    export type { HeaderProps, FooterProps, MainLayoutProps } from './types'

# Testing Integration
testing:
  structure:
    - "Co-locate tests with components"
    - "Use *.test.tsx naming convention"
    - "Test files in same directory as component"
    
  test_ids:
    - "Use data-testid for test targeting"
    - "Semantic naming: 'header-nav-desktop'"
    - "Avoid production data-testid attributes"

# Documentation Requirements
documentation:
  component_level:
    - "JSDoc comments for complex props"
    - "Usage examples in comments"
    - "Accessibility notes where relevant"
    
  storybook:
    - "Create *.stories.tsx for each component"
    - "Include all prop variations"
    - "Document interactive behaviors"

# Build and Bundle Considerations
build:
  tree_shaking:
    - "Ensure proper named exports"
    - "Avoid barrel exports with side effects"
    - "Use ES modules"
    
  code_splitting:
    - "Sheet component should be dynamically imported"
    - "Consider lazy loading heavy icons"
    - "Optimize for initial page load"

# Migration Path
migration:
  from_existing:
    - "Preserve existing component APIs where possible"
    - "Add deprecation warnings for breaking changes"
    - "Provide codemod scripts if needed"
    
  versioning:
    - "Use semantic versioning for updates"
    - "Document breaking changes"
    - "Maintain backwards compatibility"

# Integration Examples
examples:
  basic_page: |
    // app/page.tsx
    import { MainLayout } from '@/components/layout'
    
    export default function HomePage() {
      return (
        <MainLayout>
          <div className="container mx-auto px-4 py-8">
            <h1>Welcome to Animal Protection Foundation</h1>
          </div>
        </MainLayout>
      )
    }
    
  with_custom_props: |
    // app/about/page.tsx
    <MainLayout
      headerProps={{ sticky: false }}
      footerProps={{ showTrustSignals: true }}
      className="about-page"
    >
      <AboutContent />
    </MainLayout>
    
  standalone_header: |
    // components/CustomLayout.tsx
    import { Header, Footer } from '@/components/layout'
    
    export function CustomLayout({ children }) {
      return (
        <>
          <Header navItems={customNavItems} />
          <div className="custom-wrapper">{children}</div>
          <Footer />
        </>
      )
    }