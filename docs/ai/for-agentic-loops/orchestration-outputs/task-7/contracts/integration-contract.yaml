file_structure:
  # Component File Locations
  components:
    header:
      primary: packages/web/src/components/layout/Header.tsx
      tests: packages/web/src/components/layout/__tests__/Header.test.tsx
      stories: packages/web/src/components/layout/__stories__/Header.stories.tsx
      
    footer:
      primary: packages/web/src/components/layout/Footer.tsx
      tests: packages/web/src/components/layout/__tests__/Footer.test.tsx
      stories: packages/web/src/components/layout/__stories__/Footer.stories.tsx
      
    mainLayout:
      primary: packages/web/src/components/layout/MainLayout.tsx
      tests: packages/web/src/components/layout/__tests__/MainLayout.test.tsx
      stories: packages/web/src/components/layout/__stories__/MainLayout.stories.tsx
      
  # Supporting Files
  supporting:
    types: packages/web/src/types/layout.ts
    utils: packages/web/src/lib/layout-utils.ts
    hooks: packages/web/src/hooks/useScrollPosition.ts
    constants: packages/web/src/constants/navigation.ts
    
  # Export Barrels
  exports:
    layoutComponents: packages/web/src/components/layout/index.ts
    
# Import/Export Patterns
imports:
  # Standard Import Order
  order:
    - React and Next.js core
    - External packages (npm)
    - Internal packages (monorepo)
    - Absolute imports (app code)
    - Relative imports (local)
    - Type imports
    - Style imports
    
  # Example Header Imports
  headerExample: |
    'use client'
    
    import * as React from 'react'
    import Link from 'next/link'
    import { usePathname } from 'next/navigation'
    import { Menu, X } from 'lucide-react'
    
    import { ThemeSwitcher } from '@minniewinnie/ui'
    
    import { Button } from '@/components/ui/button'
    import { Sheet, SheetContent, SheetHeader, SheetTitle, SheetTrigger } from '@/components/ui/sheet'
    import { cn } from '@/lib/utils'
    import { trackEvent } from '@/lib/analytics'
    
    import type { HeaderProps } from '@/types/layout'

# Export Patterns
exports:
  # Component Exports
  namedExports: |
    // Individual component files
    export { Header } from './Header'
    export type { HeaderProps } from '@/types/layout'
    
  # Barrel Export
  barrelExport: |
    // layout/index.ts
    export { Header } from './Header'
    export { Footer } from './Footer'
    export { MainLayout } from './MainLayout'
    
    // Re-export types
    export type { HeaderProps, FooterProps, MainLayoutProps } from '@/types/layout'

# Theme Integration
themes:
  # CSS Variable Usage
  cssVariables:
    required:
      - "--background"
      - "--foreground"
      - "--primary"
      - "--primary-foreground"
      - "--secondary"
      - "--secondary-foreground"
      - "--muted"
      - "--muted-foreground"
      - "--accent"
      - "--accent-foreground"
      - "--border"
      - "--ring"
      
  # Theme Application
  implementation:
    - Use CSS variables for all colors
    - Apply via Tailwind classes (bg-background, text-foreground)
    - Theme-specific classes with data attributes
    - Example: "[data-theme='gentle'] .header { ... }"
    
  # Theme Context Integration
  context: |
    import { useTheme } from '@/providers/theme-provider'
    
    function Component() {
      const { theme, setTheme } = useTheme()
      // Use theme for conditional rendering
    }

# Testing Requirements
testing:
  # Unit Tests
  unit:
    coverage:
      - Component rendering
      - Props handling
      - Event handlers
      - Accessibility features
      - Theme switching
      - Responsive behavior
      
    tools:
      - Jest + React Testing Library
      - @testing-library/user-event
      - jest-axe for a11y
      
    example: |
      import { render, screen } from '@/test/utils'
      import userEvent from '@testing-library/user-event'
      import { axe } from 'jest-axe'
      import { Header } from '../Header'
      
      describe('Header', () => {
        it('should be accessible', async () => {
          const { container } = render(<Header />)
          const results = await axe(container)
          expect(results).toHaveNoViolations()
        })
        
        it('should toggle mobile menu', async () => {
          const user = userEvent.setup()
          render(<Header />)
          
          const menuButton = screen.getByLabelText('Open navigation menu')
          await user.click(menuButton)
          
          expect(screen.getByRole('dialog')).toBeInTheDocument()
        })
      })
      
  # Integration Tests
  integration:
    scope:
      - Layout composition
      - Navigation flow
      - Theme persistence
      - Route changes
      
  # Visual Regression Tests
  visual:
    - All theme variations
    - Mobile/tablet/desktop
    - Interactive states
    - Error states

# Package Integration
packages:
  # UI Package Integration
  fromUI:
    - Theme provider
    - Design tokens
    - Base components
    usage: |
      import { ThemeSwitcher, ThemeProvider } from '@minniewinnie/ui'
      
  # Shared Package Integration
  fromShared:
    - Type definitions
    - Utility functions
    - Constants
    usage: |
      import { NavigationItem, SocialLink } from '@minniewinnie/shared'
      
  # Web Package Internal
  internal:
    shadcnComponents:
      - Button
      - Sheet (for mobile menu)
      - DropdownMenu (for user menu)
      - Tooltip
      - Separator
      
    customComponents:
      - Logo
      - EmergencyBanner
      - NewsletterForm

# shadcn/ui Component Usage
shadcnIntegration:
  # Required Components
  required:
    - name: Sheet
      purpose: Mobile navigation menu
      location: components/ui/sheet
      
    - name: Button
      purpose: Interactive elements
      location: components/ui/button
      
    - name: Separator
      purpose: Visual dividers
      location: components/ui/separator
      
  # Optional Components
  optional:
    - name: NavigationMenu
      purpose: Desktop dropdown navigation
      location: components/ui/navigation-menu
      
    - name: DropdownMenu
      purpose: User account menu
      location: components/ui/dropdown-menu
      
  # Installation Commands
  installation: |
    # Install required shadcn/ui components
    pnpm dlx shadcn@latest add sheet
    pnpm dlx shadcn@latest add button
    pnpm dlx shadcn@latest add separator
    
    # Optional components
    pnpm dlx shadcn@latest add navigation-menu
    pnpm dlx shadcn@latest add dropdown-menu

# Configuration Files
configuration:
  # TypeScript Config
  typescript:
    paths:
      "@/components/*": ["./src/components/*"]
      "@/lib/*": ["./src/lib/*"]
      "@/hooks/*": ["./src/hooks/*"]
      "@/types/*": ["./src/types/*"]
      
  # Tailwind Config
  tailwind:
    extend:
      - Custom animations for menu
      - Layout-specific utilities
      - Theme color mappings

# Build & Bundle
build:
  # Code Splitting
  splitting:
    - Lazy load heavy footer sections
    - Dynamic import for mobile menu
    - Defer non-critical scripts
    
  # Tree Shaking
  optimization:
    - Import only needed icons
    - Selective shadcn imports
    - Remove unused theme code
    
  # Bundle Size Targets
  targets:
    header: "< 20KB gzipped"
    footer: "< 25KB gzipped"
    mainLayout: "< 5KB gzipped"

