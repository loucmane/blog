# Integration Contract for Task 7: Build Core Layout Components
# This contract defines file structures, import patterns, and testing requirements

file_structure:
  components:
    location: "packages/web/src/components/layout/"
    files:
      - "Header.tsx           # Main header component"
      - "Footer.tsx           # Main footer component"
      - "MainLayout.tsx       # Layout wrapper component"
      - "MobileMenu.tsx       # Mobile navigation component"
      - "SkipNavigation.tsx   # Skip to content component"
      - "EmergencyBanner.tsx  # Emergency appeal banner"
      - "index.ts             # Barrel exports"
  
  hooks:
    location: "packages/web/src/hooks/"
    files:
      - "use-mobile-menu.ts   # Mobile menu state"
      - "use-scroll-header.ts # Header scroll behavior"
      - "use-emergency-banner.ts # Banner state management"
  
  types:
    location: "packages/web/src/types/"
    files:
      - "layout.ts # Layout-specific types"
    integration:
      - "Import from existing ui.ts for base types"
      - "Import from emergency.ts for emergency types"
  
  tests:
    location: "packages/web/src/components/layout/__tests__/"
    files:
      - "Header.test.tsx"
      - "Footer.test.tsx"
      - "MainLayout.test.tsx"
      - "MobileMenu.test.tsx"
      - "integration.test.tsx"

import_patterns:
  component_imports:
    # React and Next.js - always first
    - "import * as React from 'react'"
    - "import Link from 'next/link'"
    - "import { useRouter } from 'next/navigation'"
    
    # External packages - alphabetical
    - "import { Menu, X, ChevronDown } from 'lucide-react'"
    
    # Monorepo packages
    - "import { ThemeSwitcher } from '@minniewinnie/ui'"
    
    # Local absolute imports
    - "import { Button } from '@/components/ui/button'"
    - "import { Sheet, SheetContent } from '@/components/ui/sheet'"
    - "import { cn } from '@/lib/utils'"
    
    # Local relative imports
    - "import { useScrollHeader } from '../../hooks/use-scroll-header'"
    
    # Types - always last
    - "import type { HeaderProps } from '@/types/layout'"
  
  export_patterns:
    named_exports:
      - "export { Header }"
      - "export { Footer }"
      - "export { MainLayout }"
    
    barrel_exports:
      - "export * from './Header'"
      - "export * from './Footer'"
      - "export * from './MainLayout'"
    
    type_exports:
      - "export type { HeaderProps, FooterProps, MainLayoutProps }"

naming_conventions:
  components:
    pattern: "PascalCase"
    examples:
      - "Header"
      - "MobileMenu"
      - "EmergencyBanner"
  
  files:
    pattern: "PascalCase for components, kebab-case for others"
    examples:
      - "Header.tsx"
      - "use-mobile-menu.ts"
      - "layout.types.ts"
  
  props_interfaces:
    pattern: "ComponentNameProps"
    examples:
      - "HeaderProps"
      - "FooterProps"
      - "MainLayoutProps"
  
  hooks:
    pattern: "use-kebab-case"
    examples:
      - "useMobileMenu"
      - "useScrollHeader"
      - "useEmergencyBanner"

theme_integration:
  css_variables:
    - "Use theme-aware Tailwind classes"
    - "Examples: bg-background, text-foreground, border-border"
    - "Never use hard-coded colors"
  
  component_adaptation:
    - "Header shadow varies by theme"
    - "Mobile menu background respects theme"
    - "Trust signals adapt to contrast theme"
    - "Emergency banner colors theme-aware"
  
  gentle_theme_specific:
    - "Softer shadows on header"
    - "Reduced visual weight on borders"
    - "Muted emergency banner colors"
    - "Calmer transition effects"

testing_requirements:
  unit_tests:
    - "Component renders correctly"
    - "Props are applied properly"
    - "ARIA attributes present"
    - "Event handlers called"
    - "Responsive behavior works"
  
  integration_tests:
    - "Navigation flow works end-to-end"
    - "Theme switching affects all components"
    - "Mobile menu interaction complete"
    - "Skip navigation functions"
    - "Emergency banner lifecycle"
  
  accessibility_tests:
    - "Keyboard navigation complete"
    - "Screen reader announces correctly"
    - "Color contrast passes WCAG AA"
    - "Focus management works"
    - "Touch targets are 44px+"
  
  visual_regression:
    - "All themes render correctly"
    - "Responsive breakpoints work"
    - "No layout shifts occur"
    - "Animations respect preferences"

  performance_tests:
    - "First paint under threshold"
    - "No cumulative layout shift"
    - "Bundle size within budget"
    - "Lighthouse score 98+"

dependency_requirements:
  existing_ui_components:
    - "Sheet (from shadcn/ui)"
    - "Button (from shadcn/ui)"
    - "Separator (optional)"
    - "Tooltip (for trust signals)"
  
  ui_package:
    - "ThemeSwitcher component"
    - "Theme context/hooks"
    - "Design tokens"
  
  shared_package:
    - "Type definitions"
    - "Validation schemas"
    - "Constants"
  
  external:
    - "lucide-react for icons"
    - "clsx/cn for classnames"
    - "@radix-ui/react-slot (if needed)"

code_patterns:
  forwardRef_usage:
    - "All layout components use React.forwardRef"
    - "Proper TypeScript typing for refs"
    - "displayName set on all components"
  
  prop_spreading:
    - "Spread props after className merge"
    - "Omit handled props from spread"
    - "Maintain prop priority order"
  
  event_handling:
    - "Stable references with useCallback"
    - "Proper cleanup in useEffect"
    - "Event delegation where appropriate"
  
  performance:
    - "Memoize expensive computations"
    - "Lazy load non-critical components"
    - "Use React.memo for pure components"
    - "Debounce scroll events"