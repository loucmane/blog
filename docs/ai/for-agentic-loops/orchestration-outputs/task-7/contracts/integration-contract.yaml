# Integration Contract for Task 7: Build Core Layout Components
# This contract defines file organization, import patterns, and integration requirements
# to ensure consistent implementation across all specialist agents

# File Naming Conventions

component_files:
  naming_pattern: "PascalCase.tsx"
  location: "packages/web/src/components/layout/"
  required_files:
    - "Header.tsx           # Main header component"
    - "Footer.tsx           # Main footer component"
    - "MainLayout.tsx       # Layout wrapper component"
    - "MobileNav.tsx        # Mobile navigation using Sheet"
    - "index.ts             # Barrel exports"
  
  optional_files:
    - "EmergencyBanner.tsx  # Emergency appeal banner"
    - "NavigationLandmarks.tsx # ARIA landmark management"
    - "BackToTop.tsx        # Scroll to top button"

type_files:
  pattern: "types.ts or ComponentName.types.ts"
  location: "Same directory as component"
  exports: "Named exports only"

test_files:
  pattern: "ComponentName.test.tsx"
  location: "__tests__ folder in component directory"
  framework: "Jest + React Testing Library"

# Import/Export Patterns

import_order:
  description: "Consistent import ordering across all files"
  order:
    1_react: "React and React-related imports"
    2_next: "Next.js specific imports"
    3_external: "Third-party libraries"
    4_ui_package: "Imports from @minniewinnie/ui"
    5_shadcn: "shadcn/ui components"
    6_internal: "Internal project imports"
    7_types: "Type imports"
    8_styles: "CSS/style imports"
  
  example: |
    // React
    import * as React from 'react'
    import { useState, useEffect } from 'react'
    
    // Next.js
    import Link from 'next/link'
    import { useRouter } from 'next/navigation'
    
    // External libraries
    import { Menu, X, ChevronUp } from 'lucide-react'
    
    // UI package
    import { ThemeSwitcher } from '@minniewinnie/ui'
    
    // shadcn/ui
    import { Button } from '@/components/ui/button'
    import { Sheet, SheetContent, SheetHeader, SheetTitle } from '@/components/ui/sheet'
    
    // Internal
    import { cn } from '@/lib/utils'
    
    // Types
    import type { HeaderProps } from './types'

export_patterns:
  components:
    pattern: "Named exports with displayName"
    example: |
      const Header = React.forwardRef<HTMLElement, HeaderProps>(
        ({ className, ...props }, ref) => {
          // Component implementation
        }
      )
      Header.displayName = 'Header'
      
      export { Header }
  
  barrel_exports: |
    // index.ts
    export { Header } from './Header'
    export { Footer } from './Footer'
    export { MainLayout } from './MainLayout'
    export { MobileNav } from './MobileNav'
    
    // Export types
    export type { HeaderProps, FooterProps, MainLayoutProps } from './types'

# Theme Integration Approach

theme_system:
  css_variables:
    description: "Use CSS variables for all theme values"
    required_classes:
      backgrounds:
        - "bg-background"     # Main background
        - "bg-foreground"     # Inverted areas
        - "bg-primary"        # Primary actions
        - "bg-muted"          # Subtle backgrounds
      
      text:
        - "text-foreground"   # Main text
        - "text-muted-foreground" # Secondary text
        - "text-primary-foreground" # Text on primary bg
      
      borders:
        - "border-border"     # Default borders
        - "border-input"      # Form borders
        - "border-primary"    # Emphasized borders
  
  theme_switching:
    component: "ThemeSwitcher from @minniewinnie/ui"
    placement: "Header component, visible on all screen sizes"
    integration: |
      // In Header.tsx
      import { ThemeSwitcher } from '@minniewinnie/ui'
      
      // Desktop placement
      <nav className="hidden md:flex items-center space-x-6">
        {/* Nav items */}
        <ThemeSwitcher />
      </nav>
      
      // Mobile placement (outside menu)
      <div className="flex md:hidden items-center space-x-2">
        <ThemeSwitcher />
        <Button variant="ghost" size="icon">
          <Menu className="h-5 w-5" />
        </Button>
      </div>

