# Interface Contract for Task 7: Core Layout Components
# This contract defines the component APIs and prop interfaces that all specialists must follow

version: "1.0"
task_id: 7
created: "2025-06-25"
purpose: "Define consistent component interfaces for layout components"

# Core Component Interfaces

header_component:
  name: "Header"
  props:
    # Required props (none - all optional for flexibility)
    # Optional props
    sticky:
      type: "boolean"
      default: true
      description: "Whether header sticks to top on scroll"
    className:
      type: "string"
      description: "Additional CSS classes"
    role:
      type: "string" 
      default: "banner"
      description: "ARIA landmark role"
    skipToContentId:
      type: "string"
      default: "main-content"
      description: "ID for skip navigation link target"
    logo:
      type: "ReactNode | LogoConfig"
      description: "Custom logo element or configuration"
      example: |
        logo={{ src: "/logo.svg", alt: "Animal Protection Foundation" }}
        # or
        logo={<CustomLogo />}
    navItems:
      type: "NavigationItem[]"
      description: "Navigation items to display"
      default: "Built-in navigation structure"
    mobileBreakpoint:
      type: "string"
      default: "md"
      description: "Tailwind breakpoint for mobile menu"
    onNavClick:
      type: "(item: NavigationItem) => void"
      description: "Callback when navigation item clicked"
  
  # TypeScript interface example
  typescript_interface: |
    interface HeaderProps extends React.HTMLAttributes<HTMLElement> {
      sticky?: boolean;
      skipToContentId?: string;
      logo?: ReactNode | LogoConfig;
      navItems?: NavigationItem[];
      mobileBreakpoint?: 'sm' | 'md' | 'lg';
      onNavClick?: (item: NavigationItem) => void;
    }
    
    interface LogoConfig {
      src?: string;
      alt: string;
      href?: string;
      width?: number;
      height?: number;
    }
    
    interface NavigationItem {
      href: string;
      label: string;
      icon?: ReactNode;
      external?: boolean;
      highlight?: boolean;
    }

footer_component:
  name: "Footer"
  props:
    className:
      type: "string"
      description: "Additional CSS classes"
    role:
      type: "string"
      default: "contentinfo"
      description: "ARIA landmark role"
    sections:
      type: "FooterSection[]"
      description: "Footer content sections"
      default: "Built-in footer structure"
    socialLinks:
      type: "SocialLink[]"
      description: "Social media links"
    trustSignals:
      type: "TrustSignal[]"
      description: "Trust indicators (SSL, charity rating, etc)"
    compactMode:
      type: "boolean"
      default: false
      description: "Show minimal footer on mobile"
  
  typescript_interface: |
    interface FooterProps extends React.HTMLAttributes<HTMLElement> {
      sections?: FooterSection[];
      socialLinks?: SocialLink[];
      trustSignals?: TrustSignal[];
      compactMode?: boolean;
    }
    
    interface FooterSection {
      title: string;
      links: FooterLink[];
    }
    
    interface FooterLink {
      href: string;
      label: string;
      external?: boolean;
    }
    
    interface SocialLink {
      platform: 'facebook' | 'twitter' | 'instagram' | 'youtube' | string;
      href: string;
      label: string;
      icon?: ReactNode;
    }
    
    interface TrustSignal {
      icon: ReactNode;
      label: string;
      href?: string;
    }

main_layout_component:
  name: "MainLayout"
  props:
    children:
      type: "React.ReactNode"
      required: true
      description: "Page content"
    className:
      type: "string"
      description: "Additional CSS classes for wrapper"
    headerProps:
      type: "HeaderProps"
      description: "Props to pass to Header component"
    footerProps:
      type: "FooterProps"
      description: "Props to pass to Footer component"
    skipToContentId:
      type: "string"
      default: "main-content"
      description: "ID for main content area"
    maxWidth:
      type: "string | false"
      default: "container"
      description: "Max width constraint or false for full width"
    asideContent:
      type: "ReactNode"
      description: "Optional sidebar content"
    asidePosition:
      type: "'left' | 'right'"
      default: "right"
      description: "Sidebar position when provided"
  
  typescript_interface: |
    interface MainLayoutProps {
      children: React.ReactNode;
      className?: string;
      headerProps?: Partial<HeaderProps>;
      footerProps?: Partial<FooterProps>;
      skipToContentId?: string;
      maxWidth?: string | false;
      asideContent?: ReactNode;
      asidePosition?: 'left' | 'right';
    }

# Shared Types and Utilities

shared_types: |
  // Utility type for component refs
  type LayoutComponent<T> = React.ForwardRefExoticComponent<
    T & React.RefAttributes<HTMLElement>
  >;
  
  // Theme-aware props pattern
  interface ThemeAwareProps {
    variant?: 'default' | 'primary' | 'secondary';
    colorScheme?: 'auto' | 'light' | 'dark' | 'contrast' | 'gentle';
  }
  
  // Responsive prop pattern
  type ResponsiveProp<T> = T | {
    base?: T;
    sm?: T;
    md?: T;
    lg?: T;
    xl?: T;
  };

# Component Composition Rules

composition_rules:
  - "All layout components MUST use React.forwardRef"
  - "All components MUST accept and spread HTML attributes"
  - "All components MUST support className prop for styling"
  - "Navigation items MUST support 44px touch targets"
  - "Components MUST work with all 4 theme variants"
  - "Props SHOULD be optional when sensible defaults exist"
  - "Complex props SHOULD accept both simple and object forms"

# Examples of Valid Implementations

implementation_examples:
  basic_usage: |
    // Simple usage with defaults
    <MainLayout>
      <h1>Welcome</h1>
    </MainLayout>
    
  configured_usage: |
    // Fully configured
    <MainLayout
      headerProps={{
        sticky: false,
        logo: <CustomLogo />,
        navItems: customNavItems
      }}
      footerProps={{
        compactMode: true,
        sections: customSections
      }}
      asideContent={<Newsletter />}
    >
      <BlogContent />
    </MainLayout>
    
  theme_aware_usage: |
    // With theme variants
    <Header 
      className="bg-primary-50 dark:bg-primary-900"
      navItems={navItems}
    />

# Validation Criteria

validation:
  - "TypeScript interfaces must extend appropriate HTML element interfaces"
  - "All interactive elements must be keyboard accessible"
  - "ARIA roles must be properly applied"
  - "Mobile navigation must use Sheet component from shadcn/ui"
  - "Responsive breakpoints must use Tailwind classes"
  - "Component file names follow patterns: Header.tsx, Footer.tsx, MainLayout.tsx"