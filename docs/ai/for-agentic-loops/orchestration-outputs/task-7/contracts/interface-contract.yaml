# Interface Contract for Task 7: Build Core Layout Components
# This contract defines the component APIs, props, and type definitions

header_component:
  name: "Header"
  props:
    sticky:
      type: "boolean"
      default: true
      description: "Whether header sticks to top on scroll"
    className:
      type: "string"
      optional: true
      description: "Additional CSS classes"
    logoSrc:
      type: "string"
      optional: true
      default: "null"
      description: "Custom logo image path"
    navigationItems:
      type: "NavigationItem[]"
      optional: true
      default: "defaultNavItems"
      description: "Array of navigation links"
    showThemeSwitcher:
      type: "boolean"
      default: true
      description: "Whether to show theme switcher"
    onLogoClick:
      type: "() => void"
      optional: true
      description: "Custom logo click handler"
    mobileBreakpoint:
      type: "'sm' | 'md' | 'lg'"
      default: "'md'"
      description: "Breakpoint for mobile menu"
  extends: "React.HTMLAttributes<HTMLElement>"
  ref_type: "HTMLElement"
  aria_requirements:
    - "Must have role='banner' when used as page header"
    - "Mobile menu button must have aria-label"
    - "Mobile menu must announce open/close state"

footer_component:
  name: "Footer"
  props:
    className:
      type: "string"
      optional: true
      description: "Additional CSS classes"
    showSocialLinks:
      type: "boolean"
      default: true
      description: "Whether to display social media links"
    socialLinks:
      type: "SocialLink[]"
      optional: true
      description: "Custom social media links"
    showTrustSignals:
      type: "boolean"
      default: true
      description: "Whether to show trust badges"
    trustSignals:
      type: "TrustSignal[]"
      optional: true
      description: "Custom trust signals/badges"
    showDonorInfo:
      type: "boolean"
      default: true
      description: "Whether to show tax info"
    footerSections:
      type: "FooterSection[]"
      optional: true
      description: "Custom footer link sections"
  extends: "React.HTMLAttributes<HTMLElement>"
  ref_type: "HTMLElement"
  aria_requirements:
    - "Must have role='contentinfo' when used as page footer"
    - "Social links must have aria-labels"

main_layout_component:
  name: "MainLayout"
  props:
    children:
      type: "React.ReactNode"
      required: true
      description: "Page content"
    className:
      type: "string"
      optional: true
      description: "Additional CSS classes"
    headerProps:
      type: "React.ComponentPropsWithoutRef<typeof Header>"
      optional: true
      description: "Props to pass to Header component"
    footerProps:
      type: "React.ComponentPropsWithoutRef<typeof Footer>"
      optional: true
      description: "Props to pass to Footer component"
    skipToContentId:
      type: "string"
      default: "'main-content'"
      description: "ID for skip navigation target"
    showEmergencyBanner:
      type: "boolean"
      default: false
      description: "Whether to show emergency appeal banner"
    emergencyBannerContent:
      type: "EmergencyBannerContent"
      optional: true
      description: "Emergency banner configuration"
    contentSensitivityGate:
      type: "ContentGateConfig"
      optional: true
      description: "Content sensitivity configuration"
  extends: "React.HTMLAttributes<HTMLDivElement>"
  ref_type: "HTMLDivElement"
  aria_requirements:
    - "Skip link must be first focusable element"
    - "Main content must have role='main'"
    - "Must support landmark navigation"

# Type Definitions
type_definitions:
  NavigationItem:
    href: "string"
    label: "string"
    isExternal: "boolean?"
    icon: "React.ComponentType?"
    badge: "string?"
    requiresAuth: "boolean?"
    mobileOnly: "boolean?"
    desktopOnly: "boolean?"

  SocialLink:
    platform: "'facebook' | 'twitter' | 'instagram' | 'youtube' | 'linkedin'"
    href: "string"
    label: "string"
    icon: "React.ComponentType"

  TrustSignal:
    type: "'ssl' | 'charity-rating' | 'nonprofit-status' | 'certification'"
    label: "string"
    icon: "React.ComponentType"
    href: "string?"
    tooltip: "string?"

  FooterSection:
    title: "string"
    links: "Array<{href: string, label: string}>"
    columns: "1 | 2 | 3 | 4"

  EmergencyBannerContent:
    title: "string"
    description: "string"
    ctaText: "string"
    ctaHref: "string"
    urgencyLevel: "'low' | 'medium' | 'high' | 'critical'"
    dismissible: "boolean"
    expiresAt: "Date?"

  ContentGateConfig:
    enabled: "boolean"
    defaultLevel: "1 | 2 | 3"
    rememberChoice: "boolean"

# Event Handlers
event_handlers:
  header:
    onNavigate: "(item: NavigationItem) => void"
    onMobileMenuToggle: "(isOpen: boolean) => void"
    onThemeChange: "(theme: ThemeMode) => void"
  
  footer:
    onSocialClick: "(platform: string, event: React.MouseEvent) => void"
    onFooterLinkClick: "(href: string, section: string) => void"
  
  main_layout:
    onSkipToContent: "() => void"
    onEmergencyBannerAction: "(action: 'dismiss' | 'cta') => void"
    onContentGateAction: "(action: 'allow' | 'deny', level: number) => void"

# Return Values
return_values:
  hooks:
    useMobileMenu:
      returns: "{isOpen: boolean, toggle: () => void, close: () => void}"
      description: "Mobile menu state management"
    
    useScrollHeader:
      returns: "{isVisible: boolean, isSticky: boolean}"
      description: "Header scroll behavior"
    
    useEmergencyBanner:
      returns: "{isVisible: boolean, dismiss: () => void, timeRemaining: number?}"
      description: "Emergency banner state"