# Interface Contract for Task 7: Build Core Layout Components
# This contract defines the component APIs, props, and TypeScript interfaces
# that all specialist agents must adhere to when implementing layout components

# Core Layout Component Interfaces

Header:
  name: "Header"
  props:
    sticky:
      type: "boolean"
      default: true
      description: "Whether header sticks to top on scroll"
    className:
      type: "string"
      optional: true
      description: "Additional CSS classes for customization"
    navItems:
      type: "NavItem[]"
      optional: true
      default: "defaultNavItems"
      description: "Override default navigation items"
    showDonateButton:
      type: "boolean"
      default: true
      description: "Show prominent donate button in header"
    emergencyBanner:
      type: "React.ReactNode"
      optional: true
      description: "Emergency appeal banner component to render above header"
  
  forwardRef: true
  extends: "React.HTMLAttributes<HTMLElement>"
  htmlElement: "HTMLElement"
  ariaRole: "banner"
  
  NavItem:
    href: "string"
    label: "string"
    icon: "LucideIcon?"
    external: "boolean?"
    highlight: "boolean?"
    mobileOnly: "boolean?"
    desktopOnly: "boolean?"

Footer:
  name: "Footer"
  props:
    className:
      type: "string"
      optional: true
      description: "Additional CSS classes"
    showSocialLinks:
      type: "boolean"
      default: true
      description: "Display social media links"
    showTrustSignals:
      type: "boolean"
      default: true
      description: "Display trust badges and certifications"
    customLinks:
      type: "FooterLinkSection[]"
      optional: true
      description: "Override default footer link sections"
  
  forwardRef: true
  extends: "React.HTMLAttributes<HTMLElement>"
  htmlElement: "HTMLElement"
  ariaRole: "contentinfo"
  
  FooterLinkSection:
    title: "string"
    links: "Array<{href: string, label: string, external?: boolean}>"

MainLayout:
  name: "MainLayout"
  props:
    children: 
      type: "React.ReactNode"
      required: true
      description: "Page content"
    className:
      type: "string"
      optional: true
      description: "Additional CSS classes for layout wrapper"
    headerProps:
      type: "React.ComponentPropsWithoutRef<typeof Header>"
      optional: true
      description: "Props to pass to Header component"
    footerProps:
      type: "React.ComponentPropsWithoutRef<typeof Footer>"
      optional: true
      description: "Props to pass to Footer component"
    skipToContentId:
      type: "string"
      default: "main-content"
      description: "ID for skip link target"
  
  forwardRef: true
  extends: "React.HTMLAttributes<HTMLDivElement>"
  htmlElement: "HTMLDivElement"

# Mobile Navigation Component (using Sheet)
MobileNav:
  name: "MobileNav"
  props:
    isOpen:
      type: "boolean"
      required: true
      description: "Control sheet open state"
    onOpenChange:
      type: "(open: boolean) => void"
      required: true
      description: "Handle open state changes"
    navItems:
      type: "NavItem[]"
      required: true
      description: "Navigation items to display"
    currentPath:
      type: "string"
      required: true
      description: "Current page path for active state"
    className:
      type: "string"
      optional: true
  
  # Leverages shadcn/ui Sheet component internally
  sheetProps:
    side: "right"
    className: "w-[300px] sm:w-[400px]"

# Type Exports
exports:
  - "HeaderProps"
  - "FooterProps"
  - "MainLayoutProps"
  - "MobileNavProps"
  - "NavItem"
  - "FooterLinkSection"

# Event Handlers
events:
  onNavigate:
    description: "Fired when navigation item is clicked"
    payload: "{ href: string, external: boolean }"
  
  onThemeChange:
    description: "Fired when theme is changed via header"
    payload: "{ theme: ThemeMode }"
  
  onScrollToTop:
    description: "Fired when back to top is clicked"
    payload: "{ scrollY: number }"

# Composition Patterns
composition:
  - "All components use forwardRef for ref access"
  - "Props spread to root elements for extensibility"
  - "Support className merging via cn() utility"
  - "Accept children for content composition"
  - "Use semantic HTML elements"

# Import/Export Requirements
imports:
  required:
    - "import * as React from 'react'"
    - "import { cn } from '@/lib/utils'"
    - "import Link from 'next/link'"
  
  fromUI:
    - "import { ThemeSwitcher } from '@minniewinnie/ui'"
  
  fromShadcnUI:
    - "import { Sheet, SheetContent, SheetHeader, SheetTitle, SheetTrigger } from '@/components/ui/sheet'"
    - "import { Button } from '@/components/ui/button'"
  
  icons:
    - "import { Menu, X, ChevronUp, Heart, Shield, Award } from 'lucide-react'"

# Component File Structure
fileStructure:
  "src/components/layout/":
    - "Header.tsx"
    - "Footer.tsx"
    - "MainLayout.tsx"
    - "MobileNav.tsx"
    - "index.ts  # Re-exports all components"

# Accessibility Requirements
accessibility:
  header:
    - "Mobile menu button must have aria-label='Open navigation menu'"
    - "Mobile menu state must be announced (aria-expanded)"
    - "Current page indicated with aria-current='page'"
    - "Logo link must have descriptive text"
  
  footer:
    - "Social links must have aria-labels"
    - "External links marked with aria-label including '(opens in new tab)'"
    - "Trust signals must have descriptive alt text or aria-labels"
  
  mainLayout:
    - "Skip to main content link must be first focusable element"
    - "Main element must have id matching skipToContentId"
    - "Proper heading hierarchy maintained"
    - "ARIA landmarks properly nested"

# Performance Considerations
performance:
  - "Use dynamic imports for heavy components"
  - "Implement intersection observer for sticky header"
  - "Lazy load social media icons"
  - "Minimize re-renders with React.memo where appropriate"
  - "Use CSS transforms for animations"