# Interface Contract for Core Layout Components
# Task ID: 7 - Build Core Layout Components
# Generated by: Pre-Analysis Agent
# Purpose: Define component APIs, props, and type definitions

components:
  # Header Component Interface
  header:
    name: Header
    path: packages/web/src/components/layout/Header.tsx
    
    props:
      # Required props
      required: []
      
      # Optional props
      optional:
        - name: sticky
          type: boolean
          default: true
          description: Controls whether header sticks to top on scroll
          
        - name: className
          type: string
          description: Additional CSS classes for styling
          
        - name: children
          type: React.ReactNode
          description: Optional children for extensibility
          
        - name: emergencyBanner
          type: EmergencyBannerProps
          description: Emergency appeal banner configuration
          
    # Event handlers
    events:
      - name: onMenuToggle
        signature: (isOpen: boolean) => void
        description: Fired when mobile menu state changes
        
      - name: onNavigation
        signature: (path: string) => void
        description: Fired when navigation link is clicked
        
    # Ref forwarding
    ref:
      type: HTMLElement
      forwardRef: true
      
    # ARIA attributes
    aria:
      - role: banner
      - landmarks: true
      - labels:
          mobileMenuTrigger: "Open navigation menu"
          mobileMenuClose: "Close navigation menu"
          mainNavigation: "Main navigation"

  # Footer Component Interface
  footer:
    name: Footer
    path: packages/web/src/components/layout/Footer.tsx
    
    props:
      optional:
        - name: className
          type: string
          description: Additional CSS classes
          
        - name: hideNewsletterSignup
          type: boolean
          default: false
          description: Controls newsletter signup section visibility
          
        - name: compactMode
          type: boolean
          default: false
          description: Reduces footer size for specific pages
          
    # Ref forwarding
    ref:
      type: HTMLElement
      forwardRef: true
      
    # ARIA attributes
    aria:
      - role: contentinfo
      - landmarks: true

  # MainLayout Component Interface
  mainLayout:
    name: MainLayout
    path: packages/web/src/components/layout/MainLayout.tsx
    
    props:
      # Required props
      required:
        - name: children
          type: React.ReactNode
          description: Page content to wrap
          
      # Optional props
      optional:
        - name: className
          type: string
          description: Additional CSS classes for layout wrapper
          
        - name: headerProps
          type: ComponentPropsWithoutRef<typeof Header>
          description: Props to pass to Header component
          
        - name: footerProps
          type: ComponentPropsWithoutRef<typeof Footer>
          description: Props to pass to Footer component
          
        - name: skipToContentId
          type: string
          default: main-content
          description: ID for skip navigation target
          
        - name: containerWidth
          type: "full" | "contained" | "prose"
          default: contained
          description: Content width constraint
          
        - name: hasBackgroundPattern
          type: boolean
          default: false
          description: Shows subtle background pattern
          
    # Layout sections
    sections:
      - name: skipLink
        description: Accessibility skip to content link
        position: first
        
      - name: header
        description: Site header with navigation
        sticky: true
        
      - name: main
        description: Main content area
        semantic: main
        
      - name: footer
        description: Site footer with links
        position: last
        
    # Ref forwarding
    ref:
      type: HTMLDivElement
      forwardRef: true

# TypeScript Type Definitions
types:
  # Navigation item type
  NavItem:
    interface: |
      interface NavItem {
        href: string;
        label: string;
        isActive?: boolean;
        isEmergency?: boolean;
        icon?: React.ComponentType<{ className?: string }>;
        badge?: {
          text: string;
          variant: 'default' | 'secondary' | 'destructive';
        };
      }

  # Emergency banner props
  EmergencyBannerProps:
    interface: |
      interface EmergencyBannerProps {
        title: string;
        message: string;
        ctaText: string;
        ctaHref: string;
        dismissible?: boolean;
        priority: 'low' | 'medium' | 'high' | 'critical';
        expiresAt?: Date;
      }

  # Theme-aware component props
  ThemeAwareProps:
    interface: |
      interface ThemeAwareProps {
        themeAdaptations?: {
          gentle?: {
            reducedContrast?: boolean;
            mutedColors?: boolean;
            softerTransitions?: boolean;
          };
          contrast?: {
            enhancedBorders?: boolean;
            strongerFocus?: boolean;
          };
        };
      }

  # Social link type
  SocialLink:
    interface: |
      interface SocialLink {
        platform: 'facebook' | 'twitter' | 'instagram' | 'youtube' | 'linkedin';
        href: string;
        label: string;
        icon: React.ComponentType<{ className?: string }>;
      }

  # Footer section type
  FooterSection:
    interface: |
      interface FooterSection {
        title: string;
        links: Array<{
          href: string;
          label: string;
          external?: boolean;
        }>;
      }

# Shared Component APIs
sharedAPIs:
  # Theme switching
  themeSupport:
    - All components must support 4 themes via CSS variables
    - Components receive theme context automatically
    - No hardcoded colors allowed
    
  # Responsive behavior
  responsiveBreakpoints:
    mobile: "< 768px"
    tablet: "768px - 1023px"
    desktop: ">= 1024px"
    
  # Animation preferences
  motionPreferences:
    - Respect prefers-reduced-motion
    - Provide subtle transitions by default
    - Enhanced animations only with user preference

# Component Composition
composition:
  # Header can contain
  headerSlots:
    - logo: Custom logo component
    - navigation: Navigation items
    - actions: CTAs and theme switcher
    - emergency: Emergency banner
    
  # Footer can contain
  footerSlots:
    - branding: Organization info
    - links: Multiple link sections
    - social: Social media links
    - trust: Trust signals and certifications
    - legal: Copyright and legal info
    - newsletter: Optional newsletter signup
    
  # MainLayout can wrap
  layoutAreas:
    - header: Sticky or static
    - hero: Optional hero section
    - breadcrumbs: Optional navigation aid
    - content: Main page content
    - sidebar: Optional sidebar
    - footer: Always present

# Return Value Contracts
returns:
  # All components return
  standard:
    - Valid React elements
    - Properly forwarded refs
    - Accessible markup
    - Theme-aware styling
    
  # Header specific
  header:
    - Mobile menu state management
    - Active route highlighting
    - Smooth scroll behavior
    
  # Footer specific
  footer:
    - Newsletter form handling
    - External link security
    - Social media tracking
    
  # MainLayout specific
  mainLayout:
    - Proper landmark structure
    - Skip link functionality
    - Flexible content areas
    - SEO-friendly markup