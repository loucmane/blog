# Constraints Contract for Core Layout Components
# Task ID: 7 - Build Core Layout Components
# Generated by: Pre-Analysis Agent
# Purpose: Define performance, compatibility, and quality constraints

performance_constraints:
  # Lighthouse Score Requirements
  lighthouse:
    target: 98+ # Overall score requirement
    categories:
      performance: 
        min: 98
        critical_metrics:
          - LCP < 1.2s (Largest Contentful Paint)
          - FID < 100ms (First Input Delay)
          - CLS < 0.1 (Cumulative Layout Shift)
          - FCP < 1.8s (First Contentful Paint)
          - TTI < 3.8s (Time to Interactive)
          - TBT < 200ms (Total Blocking Time)
      accessibility:
        min: 98
        requirements:
          - All WCAG 2.1 AA criteria
          - Proper heading hierarchy
          - Sufficient color contrast
          - Focus indicators visible
      best_practices:
        min: 98
        requirements:
          - HTTPS usage
          - No console errors
          - Modern image formats
      seo:
        min: 98
        requirements:
          - Proper meta tags
          - Semantic HTML
          - Mobile-friendly

  # Bundle Size Constraints
  bundleSize:
    components:
      header:
        max: 20  # KB gzipped
        includes:
          - Component logic
          - Mobile menu functionality
          - Theme switching
      footer:
        max: 25  # KB gzipped
        includes:
          - Component logic
          - Newsletter form
          - Social icons
      mainLayout:
        max: 5   # KB gzipped
        includes:
          - Layout wrapper
          - Skip links
          - Basic structure
          
    shared_dependencies:
      max: 50  # KB gzipped for shared UI components
      includes:
        - Button component
        - Sheet component
        - Common utilities
        
  # Runtime Performance
  runtime:
    interactions:
      mobile_menu_open: < 100ms
      theme_switch: < 50ms
      route_navigation: < 200ms
      form_validation: < 16ms  # Single frame
      
    scrolling:
      fps: 60  # Maintain during scroll
      paint_time: < 16ms
      sticky_header_lag: 0ms
      
    memory:
      initial_heap: < 10MB
      peak_heap: < 50MB
      memory_leaks: none

# Browser Compatibility
compatibility:
  # Minimum Browser Versions
  browsers:
    chrome: 90+     # ~2 years back
    firefox: 88+    # ~2 years back
    safari: 14+     # ~2 years back
    edge: 90+       # Chromium-based
    
  # Mobile Browser Support
  mobile:
    ios_safari: 14+
    chrome_android: 90+
    samsung_internet: 14+
    
  # Feature Support Requirements
  features:
    required:
      - CSS Grid
      - CSS Custom Properties
      - Flexbox
      - IntersectionObserver
      - ResizeObserver
      - ES2020 features
      
    progressive:
      - CSS Container Queries
      - CSS Subgrid
      - View Transitions API
      
  # Polyfills Strategy
  polyfills:
    - Avoid polyfills for core functionality
    - Progressive enhancement preferred
    - Maximum polyfill budget: 5KB

# Accessibility Standards
accessibility:
  # WCAG 2.1 Level AA
  wcag:
    level: AA
    version: 2.1
    
  # Specific Requirements
  requirements:
    interaction:
      - 44x44px minimum touch targets
      - 8px minimum spacing between targets
      - Visible focus indicators (2px minimum)
      - Focus visible on keyboard nav only
      
    color:
      normal_text: 4.5:1 contrast ratio
      large_text: 3:1 contrast ratio  # 18pt+ or 14pt+ bold
      ui_components: 3:1 contrast ratio
      focus_indicators: 3:1 against adjacent colors
      
    motion:
      - Respect prefers-reduced-motion
      - Provide pause/stop controls
      - No seizure-inducing patterns
      - Smooth transitions under 300ms
      
    content:
      - Meaningful heading hierarchy
      - Descriptive link text
      - Alt text for images
      - ARIA labels where needed
      
  # Screen Reader Support
  screenReaders:
    tested:
      - NVDA (Windows)
      - JAWS (Windows)
      - VoiceOver (macOS/iOS)
      - TalkBack (Android)
    
    announcements:
      - Route changes
      - Menu state changes
      - Form errors
      - Loading states

# Code Style Constraints
codeStyle:
  # TypeScript Requirements
  typescript:
    strict: true
    rules:
      - No any types
      - Explicit return types
      - No ts-ignore
      - Complete JSDoc comments
      
  # React Patterns
  react:
    version: 19.1.0
    patterns:
      - Functional components only
      - Hooks for state/effects
      - ForwardRef for all components
      - Proper prop spreading
      
    forbidden:
      - Class components
      - Direct DOM manipulation
      - Inline styles
      - Anonymous functions in JSX
      
  # Import Rules
  imports:
    order:
      1: React/Next.js
      2: External packages
      3: Internal packages
      4: Absolute imports
      5: Relative imports
      6: Type imports
      7: Styles
      
    rules:
      - Named exports preferred
      - No default exports (except pages)
      - Group related imports
      - Sort alphabetically within groups

# Theme Constraints
themes:
  # CSS Variable Usage
  requirements:
    - All colors via CSS variables
    - No hardcoded color values
    - Support all 4 themes equally
    - Semantic color naming
    
  # Theme-Specific Constraints
  themeSpecific:
    gentle:
      - Maximum opacity: 0.9
      - Softer shadows
      - Muted animations
      - Reduced contrast (AA compliant)
      
    contrast:
      - Pure black/white only
      - No transparency
      - Bold borders (2px min)
      - Enhanced focus (4px)
      
    dark:
      - Preserve color meanings
      - Adjusted image brightness
      - Proper elevation shadows
      
  # Performance Impact
  switching:
    - No layout shift
    - No FOUC (Flash of Unstyled Content)
    - Instant application
    - Smooth transitions

# Component Quality
quality:
  # Testing Coverage
  coverage:
    unit: 90%+ # Minimum coverage
    integration: 80%+
    accessibility: 100%  # All components tested
    
  # Documentation
  documentation:
    required:
      - Props documentation
      - Usage examples
      - Storybook stories
      - Migration guides
      
  # Error Handling
  errors:
    - Graceful degradation
    - User-friendly messages
    - Console warnings in dev
    - Error boundaries

# Security Constraints
security:
  # Content Security
  csp:
    - No inline scripts
    - No eval usage
    - Strict source lists
    
  # External Links
  external:
    - rel="noopener noreferrer"
    - Validate URLs
    - Sanitize user input
    
  # Form Security
  forms:
    - CSRF protection
    - Input sanitization
    - Rate limiting
    - Honeypot fields

# Development Constraints
development:
  # Package Manager
  packageManager: pnpm  # Required, no npm/yarn
  
  # Build Tools
  requirements:
    - Next.js 15.3.3
    - React 19.1.0
    - TypeScript 5.8.3
    - Tailwind CSS 3.4.17
    
  # Development Workflow
  workflow:
    - Pre-commit hooks
    - Automated testing
    - Code review required
    - Performance budgets

# Monitoring Requirements
monitoring:
  # Real User Monitoring
  metrics:
    - Core Web Vitals
    - JavaScript errors
    - Navigation timing
    - Resource timing
    
  # Analytics Events
  tracking:
    - Theme switches
    - Navigation clicks
    - Newsletter signups
    - Social media clicks
    
  # Performance Budgets
  alerts:
    - Bundle size increase > 5%
    - Lighthouse score drop > 2 points
    - Error rate > 1%
    - CLS > 0.1