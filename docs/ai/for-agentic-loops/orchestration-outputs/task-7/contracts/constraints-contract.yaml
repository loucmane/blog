# Constraints Contract for Task 7: Build Core Layout Components
# This contract defines performance budgets, compatibility requirements, and quality standards
# that all specialist agents must adhere to when implementing layout components

# Performance Budgets

javascript_bundle:
  initial_load:
    max_size: "100KB"
    critical_components:
      - "Header: <15KB gzipped"
      - "Footer: <10KB gzipped"
      - "MainLayout: <5KB gzipped"
      - "MobileNav: <20KB gzipped (lazy loaded)"
    measurement: "Gzipped size after minification"
  
  total_size:
    max_size: "300KB"
    includes: "All layout components + dependencies"
    excludes: "Third-party analytics, external fonts"

css_budget:
  critical_css:
    max_size: "20KB"
    inline: true
    includes:
      - "Above-the-fold styles"
      - "Layout structure"
      - "Theme variables"
  
  total_css:
    max_size: "50KB"
    optimization:
      - "Remove unused Tailwind classes via PurgeCSS"
      - "Merge duplicate rules"
      - "Minify and compress"

performance_metrics:
  core_web_vitals:
    LCP: 
      target: "<1.2s"
      measurement: "Largest header/hero element"
      optimization: "Preload critical resources"
    
    FID:
      target: "<100ms"
      measurement: "Mobile menu interaction"
      optimization: "Use passive event listeners"
    
    CLS:
      target: "<0.1"
      measurement: "Layout shift from sticky header"
      optimization: "Reserve space for dynamic content"
  
  lighthouse_scores:
    performance: "98+"
    accessibility: "98+"
    best_practices: "98+"
    seo: "98+"
  
  specific_interactions:
    header_render: "<16ms"
    mobile_menu_open: "<100ms"
    theme_switch: "<50ms"
    scroll_handler: "Throttled to 16ms (60fps)"

# Browser Compatibility Requirements

browser_support:
  desktop:
    chrome: "Last 2 versions (currently 119+)"
    firefox: "Last 2 versions (currently 119+)"
    safari: "Last 2 versions (currently 17+)"
    edge: "Last 2 versions (currently 119+)"
  
  mobile:
    ios_safari: "iOS 14+"
    chrome_android: "Last 3 versions"
    samsung_internet: "Last 2 versions"
  
  required_features:
    css:
      - "CSS Grid (display: grid)"
      - "Flexbox with gap support"
      - "CSS Custom Properties (--var)"
      - "Transform and Transition"
      - "Clamp() for fluid typography"
    
    javascript:
      - "ES6+ syntax (transpiled via Next.js)"
      - "Intersection Observer API"
      - "ResizeObserver API"
      - "matchMedia API"
      - "localStorage API"

progressive_enhancement:
  javascript_disabled:
    - "Core navigation remains functional via SSR"
    - "Content fully accessible"
    - "Forms submit to server endpoints"
    - "Theme defaults to system preference"
  
  css_disabled:
    - "Semantic HTML provides basic structure"
    - "Content remains readable"
    - "Navigation links functional"
  
  slow_network:
    - "Critical CSS inlined in <head>"
    - "Above-fold content prioritized"
    - "Progressive image loading with blur placeholders"
    - "Service worker caching for repeat visits"

# Accessibility Standards

wcag_compliance:
  level: "WCAG 2.1 AA minimum"
  
  color_contrast:
    normal_text: "4.5:1 minimum"
    large_text: "3:1 minimum (18pt+)"
    ui_components: "3:1 minimum"
    focus_indicators: "3:1 minimum against all backgrounds"
  
  keyboard_navigation:
    requirements:
      - "All interactive elements keyboard accessible"
      - "Visible focus indicators (2px minimum)"
      - "Logical tab order (left-to-right, top-to-bottom)"
      - "No keyboard traps"
      - "Skip links as first focusable element"
    
    shortcuts:
      - "ESC closes mobile menu and modals"
      - "Enter/Space activates buttons"
      - "Arrow keys for menu navigation (optional)"
  
  screen_reader:
    requirements:
      - "Proper heading hierarchy (single h1, sequential)"
      - "ARIA landmarks for all major sections"
      - "Live regions for dynamic updates"
      - "Descriptive link text (no 'click here')"
      - "Meaningful alt text for informative images"
    
    announcements:
      - "Mobile menu open/close state"
      - "Theme changes"
      - "Loading states"
      - "Error messages"
  
  touch_targets:
    minimum_size: "44x44px"
    spacing: "8px minimum between targets"
    exceptions: "Inline text links only"
    implementation: "Use padding, not just visual size"

# Code Style Constraints

typescript:
  config:
    strict: true
    noImplicitAny: true
    strictNullChecks: true
    noUnusedLocals: true
    noUnusedParameters: true
  
  type_safety:
    - "All function parameters must be typed"
    - "All function return types explicit"
    - "No use of 'any' type"
    - "Proper generic constraints"
    - "Exhaustive switch statements"
  
  naming_conventions:
    components: "PascalCase (e.g., Header, MainLayout)"
    props: "camelCase (e.g., showDonateButton)"
    types: "PascalCase with suffix (e.g., HeaderProps)"
    enums: "PascalCase (e.g., ThemeMode)"
    constants: "UPPER_SNAKE_CASE (e.g., MAX_WIDTH)"

react_patterns:
  component_rules:
    - "Functional components only (no class components)"
    - "All layout components use React.forwardRef"
    - "displayName set on all exported components"
    - "Props interfaces extend appropriate HTML attributes"
    - "Destructure props in function parameters"
  
  hooks_rules:
    - "Follow Rules of Hooks without exception"
    - "Custom hooks prefixed with 'use'"
    - "Complete dependency arrays (no missing deps)"
    - "Cleanup functions for side effects"
    - "Avoid excessive re-renders"
  
  performance_patterns:
    - "React.memo for components with stable props"
    - "useCallback for event handlers passed as props"
    - "useMemo for expensive computations"
    - "Lazy load components below the fold"
    - "Virtualize long lists (if applicable)"

css_conventions:
  methodology: "Utility-first with Tailwind CSS"
  
  custom_styles:
    when_allowed:
      - "Complex keyframe animations"
      - "Third-party component overrides"
      - "Print-specific styles"
    approach: "CSS modules or styled-jsx"
    location: "Co-located with component"
  
  class_ordering:
    template: "layout | flexbox/grid | spacing | sizing | typography | colors | borders | effects"
    example: "flex items-center gap-4 px-6 py-3 text-sm font-medium text-primary border rounded-lg hover:bg-accent"
  
  responsive_design:
    approach: "Mobile-first"
    breakpoints: "sm: md: lg: xl: 2xl:"
    avoid: "max-width queries, inline responsive styles"

# Security Constraints

content_security:
  xss_prevention:
    - "Never use dangerouslySetInnerHTML"
    - "Sanitize all user-generated content"
    - "Validate URLs before rendering as hrefs"
    - "Use Next.js built-in protections"
  
  external_resources:
    links:
      - "Always use rel='noopener noreferrer' with target='_blank'"
      - "Validate external URLs against allowlist"
      - "Show external link indicators"
    
    scripts:
      - "No inline scripts"
      - "Subresource integrity for CDN resources"
      - "Content Security Policy headers configured"

data_handling:
  storage:
    - "No sensitive data in localStorage"
    - "Use httpOnly cookies for auth tokens"
    - "Implement proper CORS policies"
    - "No PII in URLs or query parameters"
  
  forms:
    - "CSRF protection on all forms"
    - "Rate limiting on submissions"
    - "Server-side validation required"
    - "Client-side validation for UX only"

# Testing Constraints

test_coverage:
  minimum_thresholds:
    statements: "80%"
    branches: "75%"
    functions: "80%"
    lines: "80%"
  
  required_test_types:
    unit:
      - "Component renders without errors"
      - "Props behave as documented"
      - "Event handlers fire correctly"
      - "Conditional rendering works"
    
    integration:
      - "Navigation flow complete"
      - "Theme switching persists"
      - "Mobile menu interactions"
      - "Form submissions"
    
    accessibility:
      - "axe-core passes with no violations"
      - "Keyboard navigation complete"
      - "Screen reader friendly"
      - "Color contrast valid"

test_quality:
  requirements:
    - "No skipped tests in CI"
    - "No console errors/warnings"
    - "Tests run in <5 seconds"
    - "Deterministic results"
    - "Proper test isolation"
  
  patterns:
    - "Test user behavior, not implementation"
    - "Use React Testing Library queries"
    - "Mock external dependencies"
    - "Test error boundaries"
    - "Test loading states"

# Documentation Constraints

code_documentation:
  required_comments:
    when:
      - "Complex business logic"
      - "Performance optimizations"
      - "Accessibility workarounds"
      - "Browser compatibility hacks"
      - "Security considerations"
    
    format: "JSDoc for public APIs, inline for clarification"
  
  component_docs:
    required:
      - "Purpose and usage description"
      - "Props documentation with types"
      - "Usage examples"
      - "Accessibility notes"
      - "Theme variant behaviors"
    
    format: |
      /**
       * Header component for main site navigation
       * 
       * @example
       * <Header sticky={false} showDonateButton />
       * 
       * @accessibility
       * - Skip link for keyboard navigation
       * - ARIA landmarks for screen readers
       * - Mobile menu traps focus when open
       */

# Monitoring Requirements

observability:
  performance_tracking:
    metrics:
      - "Component render times"
      - "Interaction response times"
      - "Bundle size per deployment"
      - "Core Web Vitals scores"
    
    implementation:
      - "Use web-vitals library"
      - "Send to analytics provider"
      - "Set up alerting for regressions"
      - "Track by component and route"
  
  error_tracking:
    requirements:
      - "Error boundaries on all layouts"
      - "Graceful fallback UI"
      - "User-friendly error messages"
      - "Automatic error reporting"
    
    error_budgets:
      - "JavaScript errors: <0.1% of sessions"
      - "Failed navigations: <0.01%"
      - "Component crashes: 0%"
      - "API timeouts: <1%"