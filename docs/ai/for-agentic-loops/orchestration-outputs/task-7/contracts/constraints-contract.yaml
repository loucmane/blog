# Constraints Contract for Task 7: Build Core Layout Components
# This contract defines performance, compatibility, and code quality constraints

performance_constraints:
  bundle_size:
    header_component: "< 15KB gzipped"
    footer_component: "< 10KB gzipped"
    main_layout: "< 5KB gzipped"
    mobile_menu: "< 10KB gzipped (including Sheet dependency)"
    total_layout_bundle: "< 40KB gzipped"
  
  runtime_performance:
    first_contentful_paint: "< 1.2s"
    largest_contentful_paint: "< 1.8s"
    cumulative_layout_shift: "< 0.05"
    first_input_delay: "< 50ms"
    time_to_interactive: "< 2.5s"
  
  specific_metrics:
    header_render: "< 16ms"
    mobile_menu_open: "< 100ms"
    theme_switch: "< 50ms"
    scroll_handler: "Throttled to 16ms (60fps)"
    emergency_banner_render: "< 100ms"

browser_compatibility:
  minimum_support:
    chrome: "90+"
    firefox: "88+"
    safari: "14+"
    edge: "90+"
    mobile_chrome: "90+"
    mobile_safari: "14+"
  
  feature_requirements:
    - "CSS Grid support required"
    - "CSS custom properties required"
    - "IntersectionObserver for scroll behavior"
    - "ResizeObserver for responsive behavior"
    - "Flexbox with gap support"
  
  polyfills_needed:
    - "None required for target browsers"
    - "Optional: Smooth scroll behavior"
  
  progressive_enhancement:
    - "Core functionality works without JavaScript"
    - "Theme switching requires JavaScript"
    - "Mobile menu requires JavaScript"
    - "Skip nav works without JavaScript"

accessibility_constraints:
  wcag_compliance:
    level: "AA"
    version: "2.1"
    testing: "Automated + manual required"
  
  color_contrast:
    normal_text: "4.5:1 minimum"
    large_text: "3:1 minimum"
    interactive_elements: "3:1 minimum"
    focus_indicators: "3:1 minimum"
  
  keyboard_navigation:
    - "All interactive elements reachable"
    - "Logical tab order maintained"
    - "No keyboard traps"
    - "Skip links functional"
    - "ESC key closes overlays"
  
  screen_reader:
    - "Proper heading hierarchy"
    - "Landmarks correctly labeled"
    - "Dynamic content announced"
    - "Links have descriptive text"
    - "Images have appropriate alt text"
  
  touch_targets:
    minimum_size: "44x44px"
    spacing: "8px minimum between targets"
    exceptions: "Inline text links only"

code_style_constraints:
  typescript:
    strict_mode: true
    no_any: true
    no_implicit_any: true
    explicit_return_types: true
    exhaustive_switches: true
  
  react_patterns:
    - "Functional components only"
    - "Hooks for state management"
    - "forwardRef for all components"
    - "Proper prop spreading"
    - "No inline function definitions in render"
  
  naming:
    components: "PascalCase"
    props: "camelCase"
    types: "PascalCase"
    constants: "UPPER_SNAKE_CASE"
    files: "PascalCase.tsx for components"
  
  imports:
    order:
      - "React and Next.js"
      - "External packages"
      - "Monorepo packages"
      - "Local absolute imports"
      - "Local relative imports"
      - "Types"
    grouping: "Blank line between groups"
    sorting: "Alphabetical within groups"

security_constraints:
  xss_prevention:
    - "No dangerouslySetInnerHTML"
    - "Sanitize any user input"
    - "Escape special characters"
    - "Use Next.js Link component"
  
  csp_compliance:
    - "No inline styles"
    - "No inline scripts"
    - "External resources from allowlist only"
  
  external_links:
    - "rel='noopener noreferrer' on all"
    - "target='_blank' for external only"
    - "Warn users about external navigation"

seo_constraints:
  semantic_html:
    - "Proper heading hierarchy (h1-h6)"
    - "Nav element for navigation"
    - "Main element for content"
    - "Footer element for footer"
    - "Article/section where appropriate"
  
  meta_requirements:
    - "Page title updates with navigation"
    - "Description meta tag present"
    - "Open Graph tags configured"
    - "Twitter Card tags configured"
    - "Canonical URLs set"
  
  structured_data:
    - "Organization schema on footer"
    - "SiteNavigationElement on header"
    - "BreadcrumbList where applicable"

responsive_constraints:
  breakpoints:
    mobile: "0-639px"
    tablet: "640-1023px"
    desktop: "1024px+"
  
  layout_rules:
    - "Mobile-first approach required"
    - "No horizontal scroll at any size"
    - "Text remains readable when zoomed to 200%"
    - "Images scale appropriately"
    - "Touch targets grow on mobile"
  
  testing_requirements:
    - "Test at all major breakpoints"
    - "Test with browser zoom 50-200%"
    - "Test in portrait and landscape"
    - "Test with dynamic viewport (mobile browser chrome)"

content_constraints:
  text_content:
    - "Foundation name consistent throughout"
    - "Navigation labels clear and concise"
    - "Error messages helpful and actionable"
    - "Loading states have descriptive text"
  
  imagery:
    - "Logo has text fallback"
    - "Icons have labels or tooltips"
    - "Decorative images marked as such"
    - "Content images have descriptions"
  
  emergency_content:
    - "Clear urgency indicators"
    - "Action-oriented language"
    - "Time-sensitive info prominent"
    - "Contact information easily found"

theme_constraints:
  css_variables:
    - "All colors from theme variables"
    - "No hard-coded color values"
    - "Proper variable fallbacks"
    - "Theme-aware shadows and borders"
  
  theme_switching:
    - "No flash of unstyled content"
    - "Smooth transitions between themes"
    - "Preferences persist across sessions"
    - "System preference respected initially"
  
  gentle_theme_adaptations:
    - "Reduce visual complexity"
    - "Softer contrasts where appropriate"
    - "Calmer color transitions"
    - "Less aggressive CTAs"

testing_constraints:
  coverage_requirements:
    unit_tests: "90% minimum"
    integration_tests: "Required for all user flows"
    accessibility_tests: "100% of components"
    visual_regression: "All themes and breakpoints"
  
  test_patterns:
    - "Test user interactions, not implementation"
    - "Mock external dependencies"
    - "Test error states and edge cases"
    - "Test loading and empty states"
    - "Test with different theme contexts"